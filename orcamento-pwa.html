<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c85a07" />
  <meta name="description" content="PWA de orçamento automotivo com layout fixo e campos editáveis." />
  <title>Orçamento Fonsecar PWA</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet" />
  <style>
    :root { --text-xs: clamp(0.75rem, 0.72rem + 0.12vw, 0.82rem); --text-sm: clamp(0.875rem, 0.84rem + 0.18vw, 0.98rem); --text-base: clamp(1rem, 0.95rem + 0.2vw, 1.06rem); --text-lg: clamp(1.125rem, 1.02rem + 0.35vw, 1.3rem); --text-xl: clamp(1.4rem, 1.2rem + 0.8vw, 1.8rem); --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem; --radius-sm: 0.375rem; --radius-md: 0.75rem; --radius-lg: 1rem; --shadow-md: 0 10px 30px rgba(32, 18, 8, 0.14); --color-bg: #f2ede7; --color-surface: #fcf8f4; --color-surface-2: #fffdfb; --color-border: rgba(93, 57, 29, 0.16); --color-text: #2b221b; --color-text-muted: #6d6258; --color-primary: #c85a07; --color-primary-deep: #9f4706; --color-primary-soft: #fff0e4; --font-body: 'Satoshi', system-ui, sans-serif; }
    * { box-sizing: border-box; } html { -webkit-text-size-adjust: 100%; } body { margin: 0; font-family: var(--font-body); font-size: var(--text-base); color: var(--color-text); background: linear-gradient(180deg, #f6f1ec 0%, #ece5de 100%); } button, input, textarea { font: inherit; } .app { min-height: 100dvh; display: grid; grid-template-rows: auto 1fr auto; } .topbar { position: sticky; top: 0; z-index: 20; display: flex; justify-content: space-between; align-items: center; gap: var(--space-3); padding: calc(var(--space-3) + env(safe-area-inset-top)) var(--space-4) var(--space-3); background: rgba(252, 248, 244, 0.94); backdrop-filter: blur(12px); border-bottom: 1px solid var(--color-border); } .brand { display: flex; flex-direction: column; gap: 0.1rem; } .brand small { font-size: var(--text-xs); color: var(--color-text-muted); letter-spacing: 0.08em; text-transform: uppercase; } .brand strong { font-size: var(--text-lg); line-height: 1; } .actions { display: flex; gap: var(--space-2); flex-wrap: wrap; justify-content: flex-end; } .btn { min-height: 44px; border: 1px solid transparent; border-radius: 999px; padding: 0.7rem 1rem; display: inline-flex; align-items: center; justify-content: center; gap: 0.45rem; font-size: var(--text-sm); font-weight: 700; cursor: pointer; } .btn-primary { background: var(--color-primary); color: #fff; } .btn-secondary { background: var(--color-surface-2); color: var(--color-text); border-color: var(--color-border); } .workspace { width: min(100%, 980px); margin: 0 auto; padding: var(--space-4); display: grid; gap: var(--space-4); } .card { background: rgba(255,255,255,0.74); border: 1px solid var(--color-border); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); overflow: hidden; } .vehicle-panel { padding: var(--space-4); display: grid; gap: var(--space-3); background: linear-gradient(180deg, #fff8f1 0%, #fffdfa 100%); } .panel-title { font-size: var(--text-lg); margin: 0; } .field-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--space-3); } .field { display: flex; flex-direction: column; gap: 0.35rem; } .field label { font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-text-muted); font-weight: 700; } .field input, .field textarea { width: 100%; border: 1px solid rgba(107, 74, 47, 0.18); border-radius: 0.8rem; background: rgba(255,255,255,0.88); padding: 0.82rem 0.9rem; color: var(--color-text); outline: none; } .field textarea { min-height: 82px; resize: vertical; } .field input:focus, .field textarea:focus { border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(200,90,7,0.14); } .canvas-wrap { padding: var(--space-3); background: linear-gradient(180deg, #f4ebe4 0%, #efe5de 100%); } .sheet { position: relative; width: 100%; aspect-ratio: 512 / 768; border-radius: 1.1rem; overflow: hidden; background: #fff; box-shadow: 0 18px 40px rgba(47, 27, 11, 0.18); } .sheet img.template { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; user-select: none; } .overlay { position: absolute; inset: 0; } .overlay input, .overlay textarea { position: absolute; border: none; background: transparent; color: #2d241d; padding: 0; margin: 0; outline: none; font-size: clamp(9px, 1.85vw, 15px); line-height: 1.15; font-weight: 500; } .overlay textarea { resize: none; } .overlay .tiny { font-size: clamp(7px, 1.35vw, 11px); } .overlay .mid { font-size: clamp(8px, 1.55vw, 12px); } .overlay .bold { font-weight: 800; } .overlay .center { text-align: center; } .overlay .right { text-align: right; } .overlay .caps { text-transform: uppercase; } .line-item { height: 2.95%; border-radius: 0; } .footer-bar { padding: var(--space-3) var(--space-4) calc(var(--space-3) + env(safe-area-inset-bottom)); display: flex; justify-content: space-between; align-items: center; gap: var(--space-3); background: rgba(252, 248, 244, 0.98); border-top: 1px solid var(--color-border); position: sticky; bottom: 0; } .total-box { display: flex; flex-direction: column; gap: 0.1rem; } .total-box small { font-size: var(--text-xs); text-transform: uppercase; color: var(--color-text-muted); letter-spacing: 0.06em; } .total-box strong { font-size: var(--text-lg); color: var(--color-primary-deep); } .note { padding: 0 var(--space-4) var(--space-4); color: var(--color-text-muted); font-size: var(--text-sm); } @media (max-width: 720px) { .field-grid { grid-template-columns: 1fr; } .actions { width: 100%; } .actions .btn { flex: 1 1 auto; } .footer-bar { flex-direction: column; align-items: stretch; } .footer-bar .btn { width: 100%; } } @media print { body { background: #fff; } .topbar, .vehicle-panel, .footer-bar, .note { display: none !important; } .workspace { width: 100%; max-width: none; padding: 0; } .card { border: none; box-shadow: none; background: transparent; } .canvas-wrap { padding: 0; background: transparent; } .sheet { border-radius: 0; box-shadow: none; width: 210mm; height: 297mm; aspect-ratio: auto; margin: 0 auto; } @page { size: A4; margin: 0; } }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar"><div class="brand"><small>PWA orçamento</small><strong>Fonsecar</strong></div><div class="actions"><button class="btn btn-secondary" id="clearBtn" type="button">Limpar</button><button class="btn btn-primary" id="downloadBtn" type="button">Baixar PDF</button></div></header>
    <main class="workspace">
      <section class="card vehicle-panel">
        <h1 class="panel-title">Campos editáveis</h1>
        <div class="field-grid">
          <div class="field"><label for="cliente">Cliente</label><input id="cliente" data-sync="cliente" placeholder="Nome do cliente" /></div>
          <div class="field"><label for="data">Data</label><input id="data" data-sync="data" type="date" /></div>
          <div class="field"><label for="endereco">Endereço</label><input id="endereco" data-sync="endereco" placeholder="Rua, número" /></div>
          <div class="field"><label for="cidade">Cidade</label><input id="cidade" data-sync="cidade" placeholder="Cidade - UF" /></div>
          <div class="field"><label for="telefone">Telefone</label><input id="telefone" data-sync="telefone" placeholder="(00) 00000-0000" /></div>
          <div class="field"><label for="placa">Placa</label><input id="placa" data-sync="placa" placeholder="ABC1D23" /></div>
          <div class="field"><label for="veiculo">Veículo</label><input id="veiculo" data-sync="veiculo" placeholder="Marca / modelo" /></div>
          <div class="field"><label for="ano">Ano</label><input id="ano" data-sync="ano" placeholder="2022/2023" /></div>
          <div class="field"><label for="cor">Cor</label><input id="cor" data-sync="cor" placeholder="Prata" /></div>
          <div class="field"><label for="km">KM</label><input id="km" data-sync="km" placeholder="125.430" /></div>
          <div class="field"><label for="chassi">Chassi</label><input id="chassi" data-sync="chassi" placeholder="Opcional" /></div>
          <div class="field"><label for="combustivel">Combustível</label><input id="combustivel" data-sync="combustivel" placeholder="Flex / Diesel / Gasolina" /></div>
          <div class="field"><label for="consultor">Consultor</label><input id="consultor" data-sync="consultor" placeholder="Responsável" /></div>
          <div class="field"><label for="validade">Validade</label><input id="validade" data-sync="validade" placeholder="Ex.: 5 dias" /></div>
          <div class="field" style="grid-column: 1 / -1;"><label for="obs">Observações</label><textarea id="obs" data-sync="obs" placeholder="Observações gerais do orçamento"></textarea></div>
        </div>
      </section>
      <section class="card canvas-wrap">
        <div class="sheet" id="sheet"><img class="template" src="./assets/modelo.jpg" alt="Modelo de orçamento Fonsecar" width="512" height="768" /><div class="overlay" id="overlay"><input data-field="data" class="mid" style="left:69.5%; top:10.6%; width:22%;" /><input data-field="cliente" class="mid" style="left:14%; top:30.5%; width:76%;" /><input data-field="endereco" class="mid" style="left:16%; top:34.5%; width:74%;" /><input data-field="cidade" class="mid" style="left:11%; top:38.45%; width:79%;" /><input data-field="telefone" class="mid" style="left:14%; top:42.3%; width:76%;" /><input data-field="veiculo" class="tiny bold caps" style="left:8%; top:20.2%; width:32%;" /><input data-field="placa" class="tiny bold center caps" style="left:42%; top:20.2%; width:12%;" /><input data-field="ano" class="tiny bold center" style="left:55.5%; top:20.2%; width:12%;" /><input data-field="cor" class="tiny bold center caps" style="left:69%; top:20.2%; width:10%;" /><input data-field="km" class="tiny bold right" style="left:80.5%; top:20.2%; width:11%;" /><input data-field="combustivel" class="tiny bold caps" style="left:8%; top:22.75%; width:21%;" /><input data-field="chassi" class="tiny" style="left:31%; top:22.75%; width:33%;" /><input data-field="consultor" class="tiny" style="left:66.5%; top:22.75%; width:25%;" /><input data-field="validade" class="tiny center" style="left:76%; top:80.15%; width:14%;" /><textarea data-field="obs" class="tiny" style="left:7%; top:83.3%; width:61%; height:7.8%;"></textarea><input data-total class="mid bold right" style="left:83.6%; top:81.4%; width:11%;" readonly /></div></div>
      </section>
      <p class="note">O layout do orçamento fica fixo como na imagem original. Você só preenche os campos, adiciona itens e baixa em PDF pela impressão do navegador.</p>
    </main>
    <footer class="footer-bar"><div class="total-box"><small>Total calculado</small><strong id="totalDisplay">R$ 0,00</strong></div><button class="btn btn-primary" id="addItemBtn" type="button">Ver orçamento</button></footer>
  </div>
  <script>
    const state = { values: {}, items: [] };
    const defaults = Array.from({ length: 20 }, () => ({ descricao: '', quantidade: '', valor: '' }));
    state.items = defaults.map(item => ({ ...item }));
    const formatBRL = (value) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value || 0);
    const formatDate = (value) => { if (!value) return ''; const [y,m,d] = value.split('-'); return y && m && d ? `${d}/${m}/${y}` : value; };
    const parseMoney = (value) => { if (!value) return 0; const cleaned = String(value).replace(/\./g, '').replace(',', '.').replace(/[^\d.-]/g, ''); const n = Number(cleaned); return Number.isFinite(n) ? n : 0; };
    const recalcTotal = () => { const total = state.items.reduce((sum, item) => sum + ((parseFloat(item.quantidade) || 0) * parseMoney(item.valor)), 0); document.getElementById('totalDisplay').textContent = formatBRL(total); document.querySelector('[data-total]').value = formatBRL(total); };
    const bindMainFields = () => { document.querySelectorAll('[data-sync]').forEach((input) => { const key = input.dataset.sync; state.values[key] = ''; input.addEventListener('input', () => { state.values[key] = input.value; updateOverlay(key, input.value); }); }); };
    const updateOverlay = (key, value) => { document.querySelectorAll(`[data-field="${key}"]`).forEach((el) => { el.value = key === 'data' ? formatDate(value) : value; }); };
    const buildLineItems = () => { const overlay = document.getElementById('overlay'); const startTop = 49.55; const rowGap = 2.94; state.items.forEach((item, index) => { const y = startTop + rowGap * index; const num = document.createElement('input'); num.value = String(index + 1).padStart(2, '0'); num.readOnly = true; num.style.cssText = `position:absolute;left:2.2%;top:${y}%;width:5%;height:2.25%;font-size:clamp(7px,1.25vw,10px);font-weight:700;text-align:center;border:none;background:transparent;color:#2d241d;`; overlay.appendChild(num); const desc = document.createElement('input'); desc.style.cssText = `position:absolute;left:11.1%;top:${y}%;width:54%;height:2.95%;font-size:clamp(7px,1.35vw,11px);border:none;background:transparent;color:#2d241d;`; desc.value = item.descricao; desc.addEventListener('input', (e) => { state.items[index].descricao = e.target.value; }); overlay.appendChild(desc); const qtd = document.createElement('input'); qtd.inputMode = 'decimal'; qtd.style.cssText = `position:absolute;left:67.8%;top:${y}%;width:13.3%;height:2.95%;font-size:clamp(7px,1.35vw,11px);text-align:center;border:none;background:transparent;color:#2d241d;`; qtd.value = item.quantidade; qtd.addEventListener('input', (e) => { state.items[index].quantidade = e.target.value; recalcTotal(); }); overlay.appendChild(qtd); const val = document.createElement('input'); val.inputMode = 'decimal'; val.style.cssText = `position:absolute;left:82.8%;top:${y}%;width:10.6%;height:2.95%;font-size:clamp(7px,1.35vw,11px);text-align:right;border:none;background:transparent;color:#2d241d;`; val.value = item.valor; val.addEventListener('input', (e) => { state.items[index].valor = e.target.value; recalcTotal(); }); overlay.appendChild(val); }); };
    const clearAll = () => { document.querySelectorAll('[data-sync]').forEach((el) => { el.value = ''; updateOverlay(el.dataset.sync, ''); }); state.items.forEach((item) => { item.descricao = ''; item.quantidade = ''; item.valor = ''; }); document.querySelectorAll('.line-item').forEach((el) => el.value = ''); recalcTotal(); };
    document.getElementById('downloadBtn').addEventListener('click', () => window.print());
    document.getElementById('clearBtn').addEventListener('click', clearAll);
    document.getElementById('addItemBtn').addEventListener('click', () => document.querySelector('.sheet').scrollIntoView({ behavior: 'smooth', block: 'center' }));
    if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {})); }
    bindMainFields(); buildLineItems(); recalcTotal();
  </script>
</body>
</html>
