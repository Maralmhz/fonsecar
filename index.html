<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#c0420a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fonsecar">
<title>Fonsecar - Orçamento</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/logo.png">
<link rel="icon" href="assets/logo.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --orange: #c0420a;
    --orange-dark: #8c2f06;
  }
  html, body {
    min-height: 100dvh;
    background: #1a1008;
    font-family: Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  .app-header {
    background: var(--orange-dark);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .app-header img { height: 36px; object-fit: contain; }
  .app-header h1 {
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    flex: 1;
    text-align: center;
  }
  .btn-header {
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 7px 13px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-header:active { background: var(--orange-dark); }
  .btn-limpar {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.5);
    color: rgba(255,255,255,0.85);
    font-size: 12px;
    padding: 6px 10px;
  }
  .btn-limpar:active { background: rgba(255,255,255,0.1); }
  .main-scroll {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 12px 8px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .orcamento-wrapper {
    width: 100%;
    max-width: 540px;
    position: relative;
  }
  .modelo-img {
    width: 100%;
    height: auto;
    display: block;
    user-select: none;
    pointer-events: none;
    border-radius: 4px;
  }
  /* Todos os campos ficam sobre a imagem usando posicionamento em % */
  /* A imagem tem proporção 1024x1536 = 2:3 */
  /* Coordenadas medidas em pixels na imagem original, convertidas para % */
  /* x% = px/1024*100   y% = px/1536*100 */

  .campo {
    position: absolute;
    pointer-events: all;
    background: transparent;
    border: none;
    border-bottom: 1px solid transparent;
    outline: none;
    color: #2a1005;
    font-family: Arial, sans-serif;
    font-weight: 600;
    padding: 0 3px;
    line-height: 1;
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .campo:focus {
    border-bottom-color: rgba(192,66,10,0.7);
    background: rgba(255,245,210,0.5);
    border-radius: 2px;
  }
  .campo::placeholder { color: rgba(150,90,40,0.45); font-weight: 400; }
  .campo-item {
    position: absolute;
    pointer-events: all;
    background: transparent;
    border: none;
    outline: none;
    color: #2a1005;
    font-family: Arial, sans-serif;
    font-weight: 500;
    padding: 0 2px;
    line-height: 1;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .campo-item:focus { background: rgba(255,240,180,0.5); border-radius: 2px; }
  .total-display {
    position: absolute;
    pointer-events: none;
    color: #fff;
    font-family: Arial, sans-serif;
    font-weight: 700;
    text-align: right;
    line-height: 1;
  }
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1a1008ee;
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s;
    z-index: 200;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .action-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--orange-dark);
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    z-index: 100;
    padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
    box-shadow: 0 -2px 12px rgba(0,0,0,0.4);
  }
  .btn-action {
    flex: 1;
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-action:active { background: #8c2f06; transform: scale(0.97); }
  .btn-action span { font-size: 10px; font-weight: 600; opacity: 0.85; }
  @media print {
    .app-header, .action-bar, .toast { display: none !important; }
    html, body { background: white !important; }
    .main-scroll { padding: 0 !important; background: white; }
    .orcamento-wrapper { max-width: 100% !important; page-break-inside: avoid; }
    .campo, .campo-item { border-bottom: none !important; background: transparent !important; }
    @page { margin: 0; size: A4 portrait; }
  }
</style>
</head>
<body>

<header class="app-header">
  <img src="assets/logo.png" alt="Fonsecar" onerror="this.style.display='none'">
  <h1>Orçamento</h1>
  <button class="btn-header btn-limpar" onclick="limparTudo()">🗑 Limpar</button>
</header>

<div class="main-scroll">
  <div class="orcamento-wrapper" id="orcamentoBox">

    <img
      src="assets/modelo.jpeg"
      alt="Orçamento Fonsecar"
      class="modelo-img"
      id="modeloImg"
      draggable="false"
      onload="inicializar()"
    >

    <!-- =====================================================
         CAMPOS DO CABEÇALHO
         Coordenadas medidas na imagem 1024×1536:
           DATA campo:    x=638-962, y=178-197  → left=62.3%, top=11.6%, w=31.6%, h=1.25%
           Cliente:       x=130-963, y=238-257  → left=12.7%, top=15.5%, w=81.4%, h=1.25%
           Endereço:      x=157-963, y=280-299  → left=15.3%, top=18.2%, w=78.7%, h=1.25%
           Cidade:        x=107-600, y=320-339  → left=10.4%, top=20.8%, w=48.1%, h=1.25%
           Telefone:      x=137-600, y=362-381  → left=13.4%, top=23.6%, w=45.3%, h=1.25%
         ===================================================== -->
    <div id="camposOverlay" style="display:none;">

      <!-- DATA -->
      <input type="date" class="campo" id="fData"
        style="left:62.3%;top:11.6%;width:31.6%;height:1.6%;font-size:clamp(7px,1.6vw,12px);">

      <!-- CLIENTE -->
      <input type="text" class="campo" id="fCliente" placeholder="Nome completo" maxlength="55"
        style="left:12.7%;top:15.5%;width:81.4%;height:1.6%;font-size:clamp(7px,1.6vw,12px);">

      <!-- ENDEREÇO -->
      <input type="text" class="campo" id="fEndereco" placeholder="Endereço" maxlength="60"
        style="left:15.3%;top:18.2%;width:78.7%;height:1.6%;font-size:clamp(7px,1.6vw,12px);">

      <!-- CIDADE -->
      <input type="text" class="campo" id="fCidade" placeholder="Cidade" maxlength="40"
        style="left:10.4%;top:20.8%;width:48.1%;height:1.6%;font-size:clamp(7px,1.6vw,12px);">

      <!-- TELEFONE -->
      <input type="tel" class="campo" id="fTelefone" placeholder="(31) 9xxxx-xxxx" maxlength="20"
        style="left:13.4%;top:23.6%;width:45.3%;height:1.6%;font-size:clamp(7px,1.6vw,12px);">

    </div>

    <!-- Itens da tabela (gerados por JS) -->
    <div id="itensOverlay" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:none;"></div>

    <!-- Total calculado -->
    <div class="total-display" id="totalDisplay" style="display:none;"></div>

  </div>
</div>

<div class="action-bar">
  <button class="btn-action" onclick="salvarLocal()">💾 <span>Salvar</span></button>
  <button class="btn-action" onclick="imprimirPDF()">🖨️ <span>PDF</span></button>
  <button class="btn-action" onclick="compartilhar()">📤 <span>Compartilhar</span></button>
</div>

<div class="toast" id="toast"></div>

<script>
// =====================================================
// COORDENADAS DA TABELA (medidas na imagem 1024×1536)
// Cabeçalho tabela: y=435-479
// Linha 01 começa: y=479  altura por linha: 31px
// 20 linhas → y_fim = 479 + 20*31 = 1099
// Colunas (em px na imagem):
//   Descrição:  x=67-701  → left=6.5%  width=61.9%
//   Quantidade: x=704-831 → left=68.7% width=12.4%
//   Valor:      x=834-967 → left=81.4% width=13.0%
//   Total val:  x=834-967 → left=81.4% width=13.0%  y=1099+15=1114 → top=72.5%
// Em %:
//   LINHA_TOPO = 479/1536*100 = 31.19%
//   LINHA_H    = 31/1536*100  = 2.018%
// =====================================================
const NUM_ITENS  = 20;
const LINHA_TOPO = 31.19;   // % top da linha 01
const LINHA_H    = 2.018;   // % altura por linha
const COL = {
  desc:  { l: '6.5%',  w: '61.4%' },
  qtd:   { l: '68.7%', w: '12.4%' },
  valor: { l: '81.4%', w: '13.0%' }
};
// Total: y=1099-1132, centro y=1115 → top=72.6%
const TOTAL_CSS = {
  top:   '72.6%',
  left:  '81.4%',
  width: '13.0%'
};

let itens = Array.from({length: NUM_ITENS}, () => ({desc:'', qtd:'', valor:''}));
let iniciado = false;

function inicializar() {
  if (iniciado) return;
  iniciado = true;
  document.getElementById('camposOverlay').style.display = '';
  renderItens();
  posicionarTotal();
  carregarLocal();
  window.addEventListener('resize', posicionarTotal);
}

// Fallback se imagem já estava em cache
const _img = document.getElementById('modeloImg');
if (_img.complete && _img.naturalWidth > 0) inicializar();

function renderItens() {
  const ov = document.getElementById('itensOverlay');
  ov.innerHTML = '';
  ov.style.display = '';

  for (let i = 0; i < NUM_ITENS; i++) {
    const top  = (LINHA_TOPO + i * LINHA_H).toFixed(3) + '%';
    const h    = (LINHA_H * 0.78).toFixed(3) + '%';
    const fs   = 'clamp(6px,1.4vw,11px)';

    const mk = (tipo, col, align, ph) => {
      const el = document.createElement('input');
      el.type = 'text';
      el.className = 'campo-item';
      el.placeholder = ph;
      el.value = itens[i][tipo];
      el.style.cssText = `top:${top};left:${col.l};width:${col.w};height:${h};font-size:${fs};text-align:${align};`;
      el.addEventListener('input', function() {
        itens[i][tipo] = this.value;
        if (tipo === 'valor') calcTotal();
      });
      return el;
    };

    ov.appendChild(mk('desc',  COL.desc,  'left',   ''));
    ov.appendChild(mk('qtd',   COL.qtd,   'center', ''));
    ov.appendChild(mk('valor', COL.valor, 'right',  ''));
  }
}

function calcTotal() {
  let total = 0;
  itens.forEach(it => {
    const v = parseFloat(
      (it.valor || '').replace(/R\$\s*/,'').replace(/\./g,'').replace(',','.')
    ) || 0;
    total += v;
  });
  const el = document.getElementById('totalDisplay');
  el.textContent = total > 0
    ? 'R$ ' + total.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.')
    : '';
}

function posicionarTotal() {
  const el = document.getElementById('totalDisplay');
  el.style.cssText = `
    display:block;
    position:absolute;
    top:${TOTAL_CSS.top};
    left:${TOTAL_CSS.left};
    width:${TOTAL_CSS.width};
    font-size:clamp(8px,1.8vw,13px);
    text-align:right;
    color:#fff;
    font-weight:700;
    font-family:Arial,sans-serif;
    line-height:${LINHA_H}%;
    pointer-events:none;
  `;
}

function limparTudo() {
  if (!confirm('Limpar todos os campos?')) return;
  document.querySelectorAll('.campo').forEach(el => el.value = '');
  itens = Array.from({length: NUM_ITENS}, () => ({desc:'', qtd:'', valor:''}));
  renderItens();
  document.getElementById('totalDisplay').textContent = '';
  toast('🗑 Formulário limpo');
}

function salvarLocal() {
  const d = {
    data:     document.getElementById('fData').value,
    cliente:  document.getElementById('fCliente').value,
    endereco: document.getElementById('fEndereco').value,
    cidade:   document.getElementById('fCidade').value,
    telefone: document.getElementById('fTelefone').value,
    itens
  };
  try {
    localStorage.setItem('fonsecar_v3', JSON.stringify(d));
    toast('✅ Salvo com sucesso!');
  } catch(e) { toast('⚠️ Erro ao salvar'); }
}

function carregarLocal() {
  try {
    const raw = localStorage.getItem('fonsecar_v3');
    if (!raw) return;
    const d = JSON.parse(raw);
    if (d.data)     document.getElementById('fData').value     = d.data;
    if (d.cliente)  document.getElementById('fCliente').value  = d.cliente;
    if (d.endereco) document.getElementById('fEndereco').value = d.endereco;
    if (d.cidade)   document.getElementById('fCidade').value   = d.cidade;
    if (d.telefone) document.getElementById('fTelefone').value = d.telefone;
    if (d.itens)    itens = d.itens;
    renderItens();
    calcTotal();
  } catch(e) {}
}

function imprimirPDF() { window.print(); }

async function compartilhar() {
  if (navigator.share) {
    try {
      await navigator.share({
        title: 'Orçamento Fonsecar',
        text: 'Orçamento – ' + (document.getElementById('fCliente').value || 'Cliente'),
        url: window.location.href
      });
    } catch(e) {}
  } else {
    try {
      await navigator.clipboard.writeText(window.location.href);
      toast('🔗 Link copiado!');
    } catch(e) { toast('Compartilhe o link manualmente'); }
  }
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
