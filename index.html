<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#c0440a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fonsecar">
<title>Fonsecar – Orçamento</title>
<link rel="manifest" href="manifest.webmanifest">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --orange: #c0440a; --orange-dark: #8a2e05; --bar-h: 64px; }
html, body { height: 100%; background: #1a1a1a; font-family: Arial, sans-serif; overscroll-behavior: none; }

.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--bar-h); background: var(--orange);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
.topbar h1 { color: #fff; font-size: 17px; font-weight: 700; }
.btn-clear {
  background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.4);
  color: #fff; font-size: 13px; font-weight: 600;
  padding: 6px 14px; border-radius: 20px; cursor: pointer;
}
.btn-clear:active { background: rgba(255,255,255,0.35); }

.scroll-area {
  position: fixed; top: var(--bar-h); bottom: var(--bar-h);
  left: 0; right: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
  display: flex; align-items: flex-start; justify-content: center;
  padding: 10px 0; background: #1a1a1a;
}

#form-wrap { position: relative; width: min(440px, 100vw); flex-shrink: 0; }
#form-wrap img#bg { display: block; width: 100%; height: auto; pointer-events: none; user-select: none; }

.f {
  position: absolute; background: transparent; border: none;
  border-bottom: 1.5px solid rgba(139,60,5,0.45); outline: none;
  font-family: Arial, sans-serif; font-size: clamp(7px, 1.9vw, 11px);
  color: #1a1a1a; padding: 0 2px 1px; line-height: 1; height: 2.6%;
}
.f:focus { border-bottom-color: var(--orange); background: rgba(192,68,10,0.07); border-radius: 2px; }
.f.cell { border-bottom: none; text-align: left; }
.f.cell-num { border-bottom: none; text-align: center; }
.f.cell-val { border-bottom: none; text-align: right; }

#total-display {
  position: absolute; font-family: Arial, sans-serif;
  font-size: clamp(7px, 1.9vw, 11px); font-weight: 700; color: #fff;
  text-align: right; pointer-events: none;
  display: flex; align-items: center; justify-content: flex-end; padding-right: 3px;
}

.bottombar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  height: var(--bar-h); background: var(--orange-dark);
  display: grid; grid-template-columns: repeat(4, 1fr);
  border-top: 2px solid rgba(255,255,255,0.15);
}
.bar-btn {
  background: none; border: none; color: #fff;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; cursor: pointer; font-size: 10px; font-weight: 700;
  border-right: 1px solid rgba(255,255,255,0.12); padding: 4px;
}
.bar-btn:last-child { border-right: none; }
.bar-btn:active { background: rgba(255,255,255,0.18); }
.bar-btn svg { width: 22px; height: 22px; }

#toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: #222; color: #fff; font-size: 13px; font-weight: 600;
  padding: 10px 22px; border-radius: 24px; opacity: 0; transition: opacity .3s;
  pointer-events: none; z-index: 200; white-space: nowrap;
}
#toast.show { opacity: 1; }

@media print {
  .topbar, .bottombar, #toast { display: none !important; }
  html, body { background: white; }
  .scroll-area { position: static; overflow: visible; padding: 0; top: auto; bottom: auto; }
  #form-wrap { width: 100%; max-width: 100%; }
  .f { border-bottom: none !important; background: transparent !important; }
}
</style>
</head>
<body>

<div class="topbar">
  <h1>🔧 Fonsecar – Orçamento</h1>
  <button class="btn-clear" onclick="limpar()">🗑 Limpar</button>
</div>

<div class="scroll-area">
<div id="form-wrap">

<img id="bg" src="assets/modelo.jpeg" alt="Orçamento Fonsecar" crossorigin="anonymous">

  <!-- CABEÇALHO DIREITO: DATA / CLIENTE / TELEFONE -->
  <!-- A imagem tem ~768px de altura. DATA fica ~19.5%, CLIENTE ~23.5%, TELEFONE ~27.5% -->
  <!-- Lado direito começa em ~52% do bloco -->
  <input class="f" id="data"     type="text" placeholder="dd/mm/aaaa" style="top:19.4%;left:52%;width:42%;">
  <input class="f" id="cliente"  type="text" placeholder=""           style="top:23.4%;left:52%;width:42%;">
  <input class="f" id="telefone" type="tel"  placeholder=""           style="top:27.4%;left:52%;width:42%;">

  <!-- LINHA VEÍCULO / ANO / PLACA -->
  <!-- Veículo: após "VEÍCULO:" que termina ~16%, ANO após "ANO:" ~63%, PLACA após "PLACA:" ~79% -->
  <input class="f" id="veiculo"  type="text" placeholder="" style="top:31.8%;left:15.5%;width:43%;">
  <input class="f" id="ano"      type="text" placeholder="" style="top:31.8%;left:63%;width:11%;">
  <input class="f" id="placa"    type="text" placeholder="" style="top:31.8%;left:80%;width:15%;">

  <!-- TABELA: 18 linhas
       Área da tabela: left da descrição ~10%, qtd ~67%, valor ~82%
       Primeira linha ~36.8%, incremento ~3.17% por linha
       Largura: desc 54%, qtd 12%, val 13%
  -->
  <input class="f cell"     id="d1"  type="text" style="top:36.8%;left:10%;width:54%;"><input class="f cell-num" id="q1"  type="text" style="top:36.8%;left:67%;width:12%;"><input class="f cell-val" id="v1"  type="text" style="top:36.8%;left:82%;width:13%;">
  <input class="f cell"     id="d2"  type="text" style="top:39.97%;left:10%;width:54%;"><input class="f cell-num" id="q2"  type="text" style="top:39.97%;left:67%;width:12%;"><input class="f cell-val" id="v2"  type="text" style="top:39.97%;left:82%;width:13%;">
  <input class="f cell"     id="d3"  type="text" style="top:43.14%;left:10%;width:54%;"><input class="f cell-num" id="q3"  type="text" style="top:43.14%;left:67%;width:12%;"><input class="f cell-val" id="v3"  type="text" style="top:43.14%;left:82%;width:13%;">
  <input class="f cell"     id="d4"  type="text" style="top:46.31%;left:10%;width:54%;"><input class="f cell-num" id="q4"  type="text" style="top:46.31%;left:67%;width:12%;"><input class="f cell-val" id="v4"  type="text" style="top:46.31%;left:82%;width:13%;">
  <input class="f cell"     id="d5"  type="text" style="top:49.48%;left:10%;width:54%;"><input class="f cell-num" id="q5"  type="text" style="top:49.48%;left:67%;width:12%;"><input class="f cell-val" id="v5"  type="text" style="top:49.48%;left:82%;width:13%;">
  <input class="f cell"     id="d6"  type="text" style="top:52.65%;left:10%;width:54%;"><input class="f cell-num" id="q6"  type="text" style="top:52.65%;left:67%;width:12%;"><input class="f cell-val" id="v6"  type="text" style="top:52.65%;left:82%;width:13%;">
  <input class="f cell"     id="d7"  type="text" style="top:55.82%;left:10%;width:54%;"><input class="f cell-num" id="q7"  type="text" style="top:55.82%;left:67%;width:12%;"><input class="f cell-val" id="v7"  type="text" style="top:55.82%;left:82%;width:13%;">
  <input class="f cell"     id="d8"  type="text" style="top:58.99%;left:10%;width:54%;"><input class="f cell-num" id="q8"  type="text" style="top:58.99%;left:67%;width:12%;"><input class="f cell-val" id="v8"  type="text" style="top:58.99%;left:82%;width:13%;">
  <input class="f cell"     id="d9"  type="text" style="top:62.16%;left:10%;width:54%;"><input class="f cell-num" id="q9"  type="text" style="top:62.16%;left:67%;width:12%;"><input class="f cell-val" id="v9"  type="text" style="top:62.16%;left:82%;width:13%;">
  <input class="f cell"     id="d10" type="text" style="top:65.33%;left:10%;width:54%;"><input class="f cell-num" id="q10" type="text" style="top:65.33%;left:67%;width:12%;"><input class="f cell-val" id="v10" type="text" style="top:65.33%;left:82%;width:13%;">
  <input class="f cell"     id="d11" type="text" style="top:68.50%;left:10%;width:54%;"><input class="f cell-num" id="q11" type="text" style="top:68.50%;left:67%;width:12%;"><input class="f cell-val" id="v11" type="text" style="top:68.50%;left:82%;width:13%;">
  <input class="f cell"     id="d12" type="text" style="top:71.67%;left:10%;width:54%;"><input class="f cell-num" id="q12" type="text" style="top:71.67%;left:67%;width:12%;"><input class="f cell-val" id="v12" type="text" style="top:71.67%;left:82%;width:13%;">
  <input class="f cell"     id="d13" type="text" style="top:74.84%;left:10%;width:54%;"><input class="f cell-num" id="q13" type="text" style="top:74.84%;left:67%;width:12%;"><input class="f cell-val" id="v13" type="text" style="top:74.84%;left:82%;width:13%;">
  <input class="f cell"     id="d14" type="text" style="top:78.01%;left:10%;width:54%;"><input class="f cell-num" id="q14" type="text" style="top:78.01%;left:67%;width:12%;"><input class="f cell-val" id="v14" type="text" style="top:78.01%;left:82%;width:13%;">
  <input class="f cell"     id="d15" type="text" style="top:81.18%;left:10%;width:54%;"><input class="f cell-num" id="q15" type="text" style="top:81.18%;left:67%;width:12%;"><input class="f cell-val" id="v15" type="text" style="top:81.18%;left:82%;width:13%;">
  <input class="f cell"     id="d16" type="text" style="top:84.35%;left:10%;width:54%;"><input class="f cell-num" id="q16" type="text" style="top:84.35%;left:67%;width:12%;"><input class="f cell-val" id="v16" type="text" style="top:84.35%;left:82%;width:13%;">
  <input class="f cell"     id="d17" type="text" style="top:87.52%;left:10%;width:54%;"><input class="f cell-num" id="q17" type="text" style="top:87.52%;left:67%;width:12%;"><input class="f cell-val" id="v17" type="text" style="top:87.52%;left:82%;width:13%;">
  <input class="f cell"     id="d18" type="text" style="top:90.69%;left:10%;width:54%;"><input class="f cell-num" id="q18" type="text" style="top:90.69%;left:67%;width:12%;"><input class="f cell-val" id="v18" type="text" style="top:90.69%;left:82%;width:13%;">

  <!-- TOTAL na faixa laranja "TOTAL" -->
  <div id="total-display" style="top:93.6%;left:66%;width:29%;height:2.6%;">R$ 0,00</div>

</div>
</div>

<div class="bottombar">
  <button class="bar-btn" onclick="salvar()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    Salvar
  </button>
  <button class="bar-btn" onclick="baixarPDF()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Baixar PDF
  </button>
  <button class="bar-btn" onclick="imprimir()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    Imprimir
  </button>
  <button class="bar-btn" onclick="enviarPDF()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    Enviar PDF
  </button>
</div>

<div id="toast"></div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function(){});
}

var CAB = ['data','cliente','telefone','veiculo','ano','placa'];
var N = 18;

function toast(msg, dur) {
  dur = dur || 2200;
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, dur);
}

function calcTotal() {
  var total = 0;
  for (var i = 1; i <= N; i++) {
    var raw = document.getElementById('v'+i).value.replace(/[R$\s.]/g,'').replace(',','.');
    var n = parseFloat(raw);
    if (!isNaN(n)) total += n;
  }
  document.getElementById('total-display').textContent =
    'R$ ' + total.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
  return total;
}

for (var i = 1; i <= N; i++) {
  (function(idx){
    document.getElementById('v'+idx).addEventListener('input', calcTotal);
  })(i);
}

var today = new Date();
var dd = String(today.getDate()).padStart(2,'0');
var mm2 = String(today.getMonth()+1).padStart(2,'0');
var yyyy = today.getFullYear();
var dataEl = document.getElementById('data');
if (!dataEl.value) dataEl.value = dd+'/'+mm2+'/'+yyyy;

function salvar() {
  try {
    var data = {};
    CAB.forEach(function(id){ data[id] = document.getElementById(id).value; });
    for (var i = 1; i <= N; i++) {
      data['d'+i] = document.getElementById('d'+i).value;
      data['q'+i] = document.getElementById('q'+i).value;
      data['v'+i] = document.getElementById('v'+i).value;
    }
    localStorage.setItem('fonsecar_orc', JSON.stringify(data));
    toast('✅ Salvo com sucesso!');
  } catch(e) {
    toast('✅ Salvo na sessao atual');
  }
}

function carregar() {
  try {
    var raw = localStorage.getItem('fonsecar_orc');
    if (!raw) return;
    var data = JSON.parse(raw);
    CAB.forEach(function(id){ if(data[id]) document.getElementById(id).value = data[id]; });
    for (var i = 1; i <= N; i++) {
      if(data['d'+i]) document.getElementById('d'+i).value = data['d'+i];
      if(data['q'+i]) document.getElementById('q'+i).value = data['q'+i];
      if(data['v'+i]) document.getElementById('v'+i).value = data['v'+i];
    }
    calcTotal();
  } catch(e) {}
}
carregar();

function limpar() {
  if (!confirm('Limpar todos os campos?')) return;
  CAB.forEach(function(id){ document.getElementById(id).value = ''; });
  for (var i = 1; i <= N; i++) {
    document.getElementById('d'+i).value = '';
    document.getElementById('q'+i).value = '';
    document.getElementById('v'+i).value = '';
  }
  document.getElementById('data').value = dd+'/'+mm2+'/'+yyyy;
  calcTotal();
  try { localStorage.removeItem('fonsecar_orc'); } catch(e){}
}

function gerarCanvas() {
  var totalEl = document.getElementById('total-display');
  var totalTxt = totalEl.textContent;
  totalEl.style.color = 'transparent';
  var wrap = document.getElementById('form-wrap');
  return html2canvas(wrap, {
    scale: 2, useCORS: true, allowTaint: true,
    backgroundColor: null, logging: false
  }).then(function(canvas) {
    totalEl.style.color = '#fff';
    var ctx = canvas.getContext('2d');
    var wrapRect = wrap.getBoundingClientRect();
    var totalRect = totalEl.getBoundingClientRect();
    var scale = 2;
    var x = (totalRect.right - wrapRect.left) * scale - 4;
    var y = (totalRect.top - wrapRect.top + totalRect.height * 0.72) * scale;
    ctx.font = 'bold ' + Math.round(11 * scale) + 'px Arial';
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'right';
    ctx.fillText(totalTxt, x, y);
    return canvas;
  });
}

function baixarPDF() {
  toast('⏳ Gerando PDF...', 6000);
  gerarCanvas().then(function(canvas) {
    var jsPDF = window.jspdf.jsPDF;
    var pdf = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
    var imgData = canvas.toDataURL('image/jpeg', 0.95);
    var pW = pdf.internal.pageSize.getWidth();
    var pH = pdf.internal.pageSize.getHeight();
    var ratio = Math.min(pW/canvas.width, pH/canvas.height);
    var w = canvas.width * ratio;
    var h = canvas.height * ratio;
    pdf.addImage(imgData, 'JPEG', (pW-w)/2, (pH-h)/2, w, h);
    pdf.save('orcamento-fonsecar.pdf');
    toast('✅ PDF baixado!');
  }).catch(function(e){
    toast('❌ Erro ao gerar PDF');
    console.error(e);
  });
}

function imprimir() {
  window.print();
}

function enviarPDF() {
  toast('⏳ Preparando PDF...', 6000);
  gerarCanvas().then(function(canvas) {
    var jsPDF = window.jspdf.jsPDF;
    var pdf = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
    var imgData = canvas.toDataURL('image/jpeg', 0.95);
    var pW = pdf.internal.pageSize.getWidth();
    var pH = pdf.internal.pageSize.getHeight();
    var ratio = Math.min(pW/canvas.width, pH/canvas.height);
    var w = canvas.width * ratio;
    var h = canvas.height * ratio;
    pdf.addImage(imgData, 'JPEG', (pW-w)/2, (pH-h)/2, w, h);
    var blob = pdf.output('blob');
    var file = new File([blob], 'orcamento-fonsecar.pdf', {type:'application/pdf'});
    if (navigator.canShare && navigator.canShare({files:[file]})) {
      navigator.share({files:[file], title:'Orcamento Fonsecar'})
        .then(function(){ toast('✅ PDF compartilhado!'); })
        .catch(function(e){ if(e.name!=='AbortError') toast('Cancelado'); });
    } else {
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = 'orcamento-fonsecar.pdf'; a.click();
      setTimeout(function(){ URL.revokeObjectURL(url); }, 3000);
      toast('✅ PDF baixado!');
    }
  }).catch(function(e){
    toast('❌ Erro ao enviar PDF');
    console.error(e);
  });
}

setInterval(salvar, 30000);
</script>
</body>
</html>
