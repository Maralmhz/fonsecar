<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#C84B00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fonsecar">
<title>Fonsecar — Orçamento</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Share+Tech+Mono&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  :root {
    --orange: #C84B00;
    --orange-dark: #9e3a00;
    --orange-light: #e85d00;
    --orange-pale: #f4a96a;
    --cream: #f5f0e8;
    --cream-dark: #ede4d4;
    --dark: #1a0a00;
    --dark2: #2d1200;
    --gray: #6b5c4e;
    --white: #ffffff;
    --border: #c89060;
    --row-odd: #faf6f0;
    --row-even: #f0e8da;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    min-height: 100vh;
    background: var(--dark);
    font-family: 'Roboto', sans-serif;
    color: var(--dark);
    overscroll-behavior: none;
  }

  /* ── TOP BAR ── */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: var(--dark);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
    height: 56px;
    border-bottom: 2px solid var(--orange);
    box-shadow: 0 2px 20px rgba(200,75,0,0.4);
  }

  .topbar-logo {
    display: flex; align-items: center; gap: 10px;
  }

  .logo-badge {
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .logo-badge img {
    width: 38px; height: 38px;
    object-fit: contain;
  }

  .topbar h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; color: var(--white); letter-spacing: 2px;
    line-height: 1;
  }

  .topbar h1 span {
    display: block; font-family: 'Oswald', sans-serif;
    font-size: 10px; color: var(--orange-pale); letter-spacing: 3px;
    font-weight: 400; text-transform: uppercase;
  }

  .btn-new {
    background: var(--orange);
    border: none; color: white;
    font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 8px 14px; border-radius: 4px; cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .btn-new:active { background: var(--orange-dark); transform: scale(0.97); }

  /* ── MAIN ── */
  main {
    margin-top: 56px;
    padding: 0 0 100px 0;
    max-width: 600px;
    margin-left: auto; margin-right: auto;
  }

  /* ── DOCUMENT WRAPPER ── */
  .doc {
    background: var(--cream);
    margin: 12px 10px;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 4px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(200,75,0,0.3);
  }

  /* ── HEADER ── */
  .doc-header {
    background: var(--white);
    display: grid;
    grid-template-columns: 140px 1fr;
    border-bottom: 3px solid var(--orange);
  }

  .header-logo-col {
    background: var(--dark);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 12px 8px;
    position: relative;
  }

  .logo-shield {
    width: 100%;
    max-width: 110px;
  }

  /* ── LOGO IMG ── */
  .logo-shield-img {
    width: 100%;
    max-width: 110px;
    height: auto;
    object-fit: contain;
    display: block;
  }

  .header-info-col {
    padding: 14px 16px 10px;
    display: flex; flex-direction: column; gap: 2px;
  }

  .orcamento-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px; color: var(--orange);
    letter-spacing: 3px; line-height: 1;
    margin-bottom: 6px;
  }

  .field-group {
    display: flex; align-items: baseline; gap: 6px;
    border-bottom: 1.5px solid var(--border);
    padding: 2px 0;
    margin-bottom: 3px;
  }

  .field-label {
    font-family: 'Oswald', sans-serif; font-weight: 600;
    font-size: 10px; color: var(--orange-dark);
    letter-spacing: 1.5px; text-transform: uppercase;
    white-space: nowrap; flex-shrink: 0;
  }

  .field-input {
    border: none; background: transparent;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px; color: var(--dark);
    width: 100%; outline: none;
    padding: 1px 2px;
  }

  .field-input::placeholder { color: #c4b09a; font-style: italic; font-size: 10px; }
  .field-input:focus { background: rgba(200,75,0,0.06); border-radius: 2px; }

  /* ── VEHICLE ROW ── */
  .vehicle-row {
    background: var(--white);
    padding: 8px 16px;
    display: flex; gap: 12px;
    border-bottom: 2px solid var(--orange);
    flex-wrap: wrap;
  }

  .vehicle-row .field-group {
    flex: 1; min-width: 80px;
  }

  .vehicle-row .field-group:first-child {
    flex: 3;
  }

  /* ── TABLE ── */
  .items-table {
    width: 100%;
    border-collapse: collapse;
  }

  .items-table thead tr {
    background: var(--orange);
  }

  .items-table thead th {
    font-family: 'Oswald', sans-serif; font-weight: 700;
    font-size: 11px; color: white; letter-spacing: 1.5px;
    text-transform: uppercase; padding: 8px 8px;
    text-align: left;
  }

  .items-table thead th:nth-child(2),
  .items-table thead th:nth-child(3) {
    text-align: center;
  }

  .items-table thead th:nth-child(1) { width: 36px; }
  .items-table thead th:nth-child(2) { width: auto; }
  .items-table thead th:nth-child(3) { width: 80px; }
  .items-table thead th:nth-child(4) { width: 90px; }

  .item-row td {
    border-bottom: 1px solid var(--border);
    padding: 0;
    vertical-align: middle;
  }

  .item-row:nth-child(odd) td { background: var(--row-odd); }
  .item-row:nth-child(even) td { background: var(--row-even); }
  .item-row:last-child td { border-bottom: none; }

  .item-row .num {
    font-family: 'Oswald', sans-serif; font-weight: 600;
    font-size: 11px; color: var(--orange-dark);
    text-align: center; padding: 0 4px;
    user-select: none;
  }

  .item-row input {
    border: none; background: transparent;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px; color: var(--dark);
    width: 100%; outline: none;
    padding: 7px 6px;
  }

  .item-row input::placeholder { color: #cbb89e; font-size: 10px; }
  .item-row input:focus { background: rgba(200,75,0,0.07); }

  .item-row .inp-qty { text-align: center; }
  .item-row .inp-val { text-align: right; font-size: 12px; }

  /* ── TOTAL ROW ── */
  .total-row {
    background: var(--orange) !important;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
  }

  .total-row td { background: transparent !important; border: none !important; }

  .total-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; color: white; letter-spacing: 2px;
  }

  .total-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; color: white; letter-spacing: 1px;
    text-align: right;
  }

  /* ── FOOTER ── */
  .doc-footer {
    background: var(--dark);
    padding: 12px 16px;
    display: flex; flex-direction: column; gap: 4px;
  }

  .footer-item {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Roboto', sans-serif; font-size: 11px;
    color: var(--cream);
  }

  .footer-item svg { flex-shrink: 0; }

  .footer-phone {
    background: var(--orange);
    margin: 4px -16px -12px;
    padding: 8px 16px;
    display: flex; align-items: center; gap: 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; color: white; letter-spacing: 2px;
  }

  /* ── NOTES ── */
  .obs-section {
    padding: 10px 16px;
    background: var(--white);
    border-top: 1px solid var(--border);
  }

  .obs-label {
    font-family: 'Oswald', sans-serif; font-weight: 600;
    font-size: 10px; color: var(--orange-dark); letter-spacing: 1.5px;
    text-transform: uppercase; margin-bottom: 4px;
  }

  .obs-textarea {
    width: 100%; border: 1px dashed var(--border);
    border-radius: 3px; background: var(--row-odd);
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    color: var(--dark); padding: 8px; outline: none; resize: vertical;
    min-height: 56px;
  }

  /* ── BOTTOM ACTION BAR ── */
  .action-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: var(--dark2);
    border-top: 2px solid var(--orange);
    padding: 10px 16px;
    display: flex; gap: 10px;
    max-width: 600px; margin: 0 auto;
    left: 50%; transform: translateX(-50%);
  }

  @media (max-width: 600px) {
    .action-bar { left: 0; transform: none; }
  }

  .btn {
    flex: 1; border: none; border-radius: 5px;
    font-family: 'Oswald', sans-serif; font-weight: 700;
    font-size: 14px; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 13px 10px; cursor: pointer;
    transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:active { transform: scale(0.97); }

  .btn-save {
    background: transparent;
    border: 2px solid var(--orange);
    color: var(--orange-pale);
  }
  .btn-save:active { background: rgba(200,75,0,0.15); }

  .btn-pdf {
    background: var(--orange);
    color: white;
    box-shadow: 0 4px 16px rgba(200,75,0,0.4);
    flex: 1.6;
  }
  .btn-pdf:active { background: var(--orange-dark); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--dark); border: 1px solid var(--orange);
    color: var(--cream); font-family: 'Oswald', sans-serif; font-size: 13px;
    letter-spacing: 1px; padding: 10px 20px; border-radius: 20px;
    opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap;
    z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── ADD ROW BTN ── */
  .add-row-btn {
    width: 100%; background: transparent; border: none;
    font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 600;
    color: var(--orange); letter-spacing: 1.5px; text-transform: uppercase;
    padding: 10px; cursor: pointer;
    border-top: 1px dashed var(--border);
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: background 0.2s;
  }
  .add-row-btn:hover { background: rgba(200,75,0,0.06); }
  .add-row-btn:active { background: rgba(200,75,0,0.14); }

  /* ── REMOVE ROW ── */
  .btn-remove-row {
    background: none; border: none; cursor: pointer;
    color: #c4a080; font-size: 14px; padding: 4px 6px;
    opacity: 0.5; transition: opacity 0.2s, color 0.2s;
    display: none;
  }
  .item-row:hover .btn-remove-row { display: block; }
  .btn-remove-row:hover { opacity: 1; color: var(--orange); }

  /* ── GEAR DECORATION ── */
  .gear-deco {
    position: absolute; right: -10px; bottom: -10px;
    opacity: 0.08; pointer-events: none;
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-logo">
    <div class="logo-badge">
      <img src="logo.png" alt="Fonsecar Logo" width="38" height="38">
    </div>
    <h1>FONSECAR<span>Auto Mecânica</span></h1>
  </div>
  <button class="btn-new" onclick="newOrcamento()">+ NOVO</button>
</header>

<!-- MAIN CONTENT -->
<main>
  <div class="doc" id="docRoot">

    <!-- HEADER -->
    <div class="doc-header">
      <div class="header-logo-col">
        <img class="logo-shield-img" src="logo.png" alt="Fonsecar Logo">
      </div>

      <div class="header-info-col">
        <div class="orcamento-title">ORÇAMENTO</div>

        <div class="field-group">
          <span class="field-label">Nº</span>
          <input class="field-input" id="num" style="width:120px" placeholder="PLACA-DDMM" maxlength="14">
          <span class="field-label" style="margin-left:12px">Data</span>
          <input class="field-input" id="data" type="date" style="width:130px" oninput="gerarNumero()">
        </div>

        <div class="field-group">
          <span class="field-label">Cliente</span>
          <input class="field-input" id="cliente" placeholder="Nome completo">
        </div>

        <div class="field-group">
          <span class="field-label">Telefone</span>
          <input class="field-input" id="telefone" placeholder="(31) 9 0000-0000" inputmode="tel">
        </div>
      </div>
    </div>

    <!-- VEHICLE ROW -->
    <div class="vehicle-row">
      <div class="field-group" style="flex:3">
        <span class="field-label">Veículo</span>
        <input class="field-input" id="veiculo" placeholder="Marca / Modelo">
      </div>
      <div class="field-group" style="flex:1.2">
        <span class="field-label">Ano</span>
        <input class="field-input" id="ano" placeholder="2020" inputmode="numeric" maxlength="4">
      </div>
      <div class="field-group" style="flex:1.2">
        <span class="field-label">Placa</span>
        <input class="field-input" id="placa" placeholder="AAA-0000" style="text-transform:uppercase" maxlength="8" oninput="gerarNumero()">
      </div>
    </div>

    <!-- ITEMS TABLE -->
    <table class="items-table" id="itemsTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Descrição do Serviço / Peça</th>
          <th>Qtd</th>
          <th>Valor (R$)</th>
        </tr>
      </thead>
      <tbody id="itemsBody">
        <!-- rows injected by JS -->
      </tbody>
    </table>

    <button class="add-row-btn" onclick="addRow()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Adicionar Item
    </button>

    <!-- OBS -->
    <div class="obs-section">
      <div class="obs-label">Observações</div>
      <textarea class="obs-textarea" id="obs" placeholder="Informações adicionais, garantias, prazo de execução..."></textarea>
    </div>

    <!-- TOTAL -->
    <table class="items-table">
      <tfoot>
        <tr>
          <td colspan="4">
            <div class="total-row">
              <span class="total-label">TOTAL</span>
              <span class="total-value" id="totalDisplay">R$ 0,00</span>
            </div>
          </td>
        </tr>
      </tfoot>
    </table>

    <!-- FOOTER -->
    <div class="doc-footer">
      <div class="footer-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C84B00" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Rua Maranhão, 13, Bairro Industrial — Contagem, MG
      </div>
      <div class="footer-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C84B00" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/></svg>
        CEP: 32.230-440 &nbsp;|&nbsp; CNPJ: 48.549.990/0001-48
      </div>
      <div class="footer-phone">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.62 3.38 2 2 0 0 1 3.6 1.21l3-.02a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.77a16 16 0 0 0 6.32 6.32l.87-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        31 99273-0811
      </div>
    </div>

  </div><!-- /doc -->
</main>

<!-- ACTION BAR -->
<div class="action-bar">
  <button class="btn btn-save" onclick="saveLocal()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    Salvar
  </button>
  <button class="btn btn-pdf" onclick="gerarPDF()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    Gerar PDF
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let rowCount = 0;
let rows = [];

// ── GERAR NÚMERO AUTOMÁTICO (PLACA-DDMM) ──
function gerarNumero() {
  const placa = document.getElementById('placa').value.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
  const dataVal = document.getElementById('data').value; // YYYY-MM-DD
  if (!placa && !dataVal) return;

  let ddmm = '';
  if (dataVal) {
    const parts = dataVal.split('-'); // [YYYY, MM, DD]
    if (parts.length === 3) {
      ddmm = parts[2] + parts[1]; // DDMM
    }
  }

  let num = '';
  if (placa && ddmm) {
    num = placa + '-' + ddmm;
  } else if (placa) {
    num = placa;
  } else if (ddmm) {
    num = ddmm;
  }

  document.getElementById('num').value = num;
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('data').valueAsDate = new Date();

  const draft = localStorage.getItem('fonsecar_draft');
  if (draft) {
    try {
      const d = JSON.parse(draft);
      loadDraft(d);
    } catch(e) {
      gerarNumero();
      for (let i = 0; i < 10; i++) addRow();
    }
  } else {
    gerarNumero();
    for (let i = 0; i < 10; i++) addRow();
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
});

// ── ROWS ──
function addRow(desc = '', qty = '', val = '') {
  rowCount++;
  const num = rowCount;
  const tbody = document.getElementById('itemsBody');
  const tr = document.createElement('tr');
  tr.className = 'item-row';
  tr.dataset.id = num;
  tr.innerHTML = `
    <td class="num">${String(rows.length + 1).padStart(2,'0')}</td>
    <td><input class="inp-desc" placeholder="Descrição do serviço ou peça..." value="${esc(desc)}" oninput="calcTotal()"></td>
    <td><input class="inp-qty" placeholder="1" value="${esc(qty)}" inputmode="decimal" style="text-align:center;width:100%" oninput="calcTotal()"></td>
    <td style="display:flex;align-items:center">
      <input class="inp-val" placeholder="0,00" value="${esc(val)}" inputmode="decimal" style="flex:1;text-align:right" oninput="calcTotal()">
      <button class="btn-remove-row" onclick="removeRow(this)" title="Remover">✕</button>
    </td>
  `;
  tbody.appendChild(tr);
  rows.push(tr);
  renumberRows();
}

function removeRow(btn) {
  const tr = btn.closest('tr');
  tr.remove();
  rows = rows.filter(r => r !== tr);
  renumberRows();
  calcTotal();
}

function renumberRows() {
  document.querySelectorAll('#itemsBody .item-row').forEach((tr, i) => {
    tr.querySelector('.num').textContent = String(i + 1).padStart(2, '0');
  });
}

// ── CALC ──
function calcTotal() {
  let total = 0;
  document.querySelectorAll('#itemsBody .item-row').forEach(tr => {
    const qty = parseFloat(tr.querySelector('.inp-qty').value.replace(',', '.')) || 1;
    const val = parseFloat(tr.querySelector('.inp-val').value.replace(',', '.')) || 0;
    total += qty * val;
  });
  document.getElementById('totalDisplay').textContent = 'R$ ' + total.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return total;
}

function esc(s) {
  return String(s).replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

// ── SAVE ──
function saveLocal() {
  const data = gatherData();
  localStorage.setItem('fonsecar_draft', JSON.stringify(data));
  showToast('✓ Rascunho salvo!');
}

function gatherData() {
  const items = [];
  document.querySelectorAll('#itemsBody .item-row').forEach(tr => {
    items.push({
      desc: tr.querySelector('.inp-desc').value,
      qty: tr.querySelector('.inp-qty').value,
      val: tr.querySelector('.inp-val').value,
    });
  });
  return {
    num: document.getElementById('num').value,
    data: document.getElementById('data').value,
    cliente: document.getElementById('cliente').value,
    telefone: document.getElementById('telefone').value,
    veiculo: document.getElementById('veiculo').value,
    ano: document.getElementById('ano').value,
    placa: document.getElementById('placa').value,
    obs: document.getElementById('obs').value,
    items,
  };
}

function loadDraft(d) {
  document.getElementById('num').value = d.num || '';
  document.getElementById('data').value = d.data || '';
  document.getElementById('cliente').value = d.cliente || '';
  document.getElementById('telefone').value = d.telefone || '';
  document.getElementById('veiculo').value = d.veiculo || '';
  document.getElementById('ano').value = d.ano || '';
  document.getElementById('placa').value = d.placa || '';
  document.getElementById('obs').value = d.obs || '';
  const items = d.items || [];
  const total = Math.max(items.length, 10);
  for (let i = 0; i < total; i++) {
    const it = items[i] || {};
    addRow(it.desc || '', it.qty || '', it.val || '');
  }
  calcTotal();
}

function newOrcamento() {
  if (!confirm('Criar novo orçamento? O rascunho atual será perdido.')) return;
  localStorage.removeItem('fonsecar_draft');
  document.getElementById('itemsBody').innerHTML = '';
  rows = []; rowCount = 0;
  ['cliente','telefone','veiculo','ano','placa','obs','num'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('data').valueAsDate = new Date();
  gerarNumero();
  for (let i = 0; i < 10; i++) addRow();
  calcTotal();
  showToast('Novo orçamento criado');
}

// ── PDF GENERATION ──
function gerarPDF() {
  const d = gatherData();
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  const W = 210, H = 297;
  const margin = 12;
  const contentW = W - margin * 2;

  // ── BACKGROUND ──
  doc.setFillColor(245, 240, 232);
  doc.rect(0, 0, W, H, 'F');

  // ── HEADER BAND ──
  doc.setFillColor(200, 75, 0);
  doc.rect(0, 0, W, 52, 'F');

  // ── LOGO AREA (dark panel) ──
  doc.setFillColor(26, 10, 0);
  doc.rect(0, 0, 60, 52, 'F');

  // Embed logo.png into PDF
  const logoImg = new Image();
  logoImg.src = 'logo.png';
  try {
    doc.addImage(logoImg, 'PNG', 2, 2, 56, 48);
  } catch(e) {
    doc.setFillColor(200, 75, 0);
    doc.rect(2, 4, 56, 14, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(14);
    doc.text('FONSECAR', 30, 13.5, { align: 'center' });
  }

  // ── ORÇAMENTO TITLE ──
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(30);
  doc.text('ORÇAMENTO', 130, 22, { align: 'center' });

  // Numero
  doc.setFontSize(10);
  doc.setTextColor(255, 220, 180);
  doc.text('Nº ' + (d.num || '----'), 130, 32, { align: 'center' });

  // ── INFO FIELDS (on orange) ──
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8);
  const infoY = 40;
  doc.text('DATA:', 63, infoY);
  doc.text('CLIENTE:', 63, infoY + 7);

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  const dataStr = d.data ? new Date(d.data + 'T12:00:00').toLocaleDateString('pt-BR') : '';
  doc.text(dataStr, 82, infoY);
  doc.text(d.cliente || '', 82, infoY + 7);

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8);
  doc.text('TELEFONE:', 150, infoY);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.text(d.telefone || '', 170, infoY);

  // ── VEHICLE ROW ──
  doc.setFillColor(255, 255, 255);
  doc.rect(0, 52, W, 12, 'F');
  doc.setDrawColor(200, 75, 0);
  doc.setLineWidth(0.5);
  doc.line(0, 64, W, 64);

  doc.setTextColor(158, 58, 0);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8);
  doc.text('VEÍCULO:', margin, 59.5);
  doc.setTextColor(26, 10, 0);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.text(d.veiculo || '', margin + 22, 59.5);

  doc.setTextColor(158, 58, 0);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8);
  doc.text('ANO:', 120, 59.5);
  doc.setTextColor(26, 10, 0);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.text(d.ano || '', 133, 59.5);

  doc.setTextColor(158, 58, 0);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8);
  doc.text('PLACA:', 155, 59.5);
  doc.setTextColor(26, 10, 0);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.text((d.placa || '').toUpperCase(), 170, 59.5);

  // ── TABLE ──
  const tableTop = 66;
  const colX = [margin, margin + 12, margin + 12 + 112, margin + 12 + 112 + 30];
  const colW = [12, 112, 30, 34];

  doc.setFillColor(200, 75, 0);
  doc.rect(margin, tableTop, contentW, 8, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8);
  doc.text('#', colX[0] + 6, tableTop + 5.2, { align: 'center' });
  doc.text('DESCRIÇÃO DO SERVIÇO / PEÇA', colX[1] + 56, tableTop + 5.2, { align: 'center' });
  doc.text('QTD', colX[2] + 15, tableTop + 5.2, { align: 'center' });
  doc.text('VALOR (R$)', colX[3] + 17, tableTop + 5.2, { align: 'center' });

  const rowH = 8;
  let y = tableTop + 8;
  const visibleItems = (d.items || []).filter((it, i) => it.desc || it.val || i < 15);
  const displayItems = visibleItems.length > 0 ? visibleItems : Array(15).fill({});

  displayItems.forEach((item, i) => {
    const bg = i % 2 === 0 ? [250, 246, 240] : [240, 232, 218];
    doc.setFillColor(...bg);
    doc.rect(margin, y, contentW, rowH, 'F');
    doc.setDrawColor(200, 144, 96);
    doc.setLineWidth(0.3);
    doc.line(margin, y + rowH, margin + contentW, y + rowH);
    doc.line(colX[1], y, colX[1], y + rowH);
    doc.line(colX[2], y, colX[2], y + rowH);
    doc.line(colX[3], y, colX[3], y + rowH);
    doc.setTextColor(158, 58, 0);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    doc.text(String(i + 1).padStart(2, '0'), colX[0] + 6, y + 5.2, { align: 'center' });
    doc.setTextColor(26, 10, 0);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    if (item.desc) doc.text(String(item.desc), colX[1] + 2, y + 5.2);
    if (item.qty && item.qty !== '1' && item.qty !== '') {
      doc.text(String(item.qty), colX[2] + 15, y + 5.2, { align: 'center' });
    }
    if (item.val) {
      const qty = parseFloat((item.qty || '1').replace(',', '.')) || 1;
      const val = parseFloat((item.val || '0').replace(',', '.')) || 0;
      const subtotal = qty * val;
      const valStr = subtotal.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
      doc.text(valStr, colX[3] + colW[3] - 3, y + 5.2, { align: 'right' });
    }
    y += rowH;
  });

  if (d.obs) {
    y += 2;
    doc.setFillColor(255, 255, 255);
    doc.rect(margin, y, contentW, 16, 'F');
    doc.setDrawColor(200, 144, 96);
    doc.setLineWidth(0.3);
    doc.rect(margin, y, contentW, 16);
    doc.setTextColor(158, 58, 0);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(7);
    doc.text('OBSERVAÇÕES:', margin + 2, y + 5);
    doc.setTextColor(26, 10, 0);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    const obsLines = doc.splitTextToSize(d.obs, contentW - 6);
    doc.text(obsLines.slice(0, 2), margin + 2, y + 10);
    y += 18;
  }

  y += 2;
  doc.setFillColor(200, 75, 0);
  doc.rect(margin, y, contentW, 11, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(12);
  doc.text('TOTAL', margin + 10, y + 7.5);

  let total = 0;
  (d.items || []).forEach(item => {
    const qty = parseFloat((item.qty || '1').replace(',', '.')) || 1;
    const val = parseFloat((item.val || '0').replace(',', '.')) || 0;
    total += qty * val;
  });
  const totalStr = 'R$ ' + total.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
  doc.setFontSize(14);
  doc.text(totalStr, margin + contentW - 4, y + 7.5, { align: 'right' });

  const footerY = H - 32;
  doc.setFillColor(26, 10, 0);
  doc.rect(0, footerY, W, 32, 'F');
  doc.setTextColor(245, 240, 232);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8.5);
  doc.text('📍  Rua Maranhão, 13, Bairro Industrial — Contagem, MG', margin, footerY + 8);
  doc.text('      CEP: 32.230-440   |   CNPJ: 48.549.990/0001-48', margin, footerY + 15);
  doc.setFillColor(200, 75, 0);
  doc.rect(0, footerY + 20, W, 12, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(13);
  doc.text('📞  31 99273-0811', margin, footerY + 28);

  doc.setDrawColor(200, 75, 0);
  doc.setLineWidth(1.5);
  doc.rect(3, 3, W - 6, H - 6);

  const numSafe = (d.num || 'orcamento').replace(/[^a-zA-Z0-9]/g, '_');
  const cliente = (d.cliente || 'cliente').replace(/\s+/g, '_').toLowerCase();
  doc.save(`fonsecar_${numSafe}_${cliente}.pdf`);

  showToast('✓ PDF gerado com sucesso!');
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── PLACA UPPERCASE ──
document.addEventListener('input', e => {
  if (e.target.id === 'placa') e.target.value = e.target.value.toUpperCase();
});
</script>
