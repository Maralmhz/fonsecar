<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#C84B00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fonsecar">
    <title>Fonsecar - Orçamento</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Share+Tech+Mono&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --orange: #C84B00;
            --orange-dark: #9e3a00;
            --orange-light: #e85d00;
            --orange-pale: #f4a96a;
            --cream: #f5f0e8;
            --cream-dark: #ede4d4;
            --dark: #1a0a00;
            --dark2: #2d1200;
            --gray: #6b5c4e;
            --white: #ffffff;
            --border: #c89060;
            --row-odd: #faf6f0;
            --row-even: #f0e8da;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            min-height: 100vh;
            background: var(--dark);
            font-family: 'Roboto', sans-serif;
            color: var(--dark);
            overscroll-behavior: none;
        }

        /* ── HEADER NOVO (ESTILO ANTIGO) ── */
        .doc-header {
            background: var(--white);
            display: flex;
            align-items: stretch;
            padding: 20px 25px;
            gap: 20px;
        }

        .header-logo-side {
            flex: 0 0 160px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-logo-side img {
            width: 100%;
            height: auto;
            max-height: 120px;
            object-fit: contain;
        }

        .header-content-side {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .orcamento-banner {
            background: var(--orange);
            color: white;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-radius: 2px;
        }

        .orcamento-banner h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            letter-spacing: 4px;
            line-height: 1;
        }

        .num-box {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .num-label {
            font-family: 'Oswald', sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .header-main-fields {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px 20px;
        }

        .line-field {
            display: flex;
            align-items: baseline;
            gap: 8px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 2px;
        }

        .line-label {
            font-family: 'Oswald', sans-serif;
            font-size: 11px;
            font-weight: 600;
            color: var(--orange-dark);
            text-transform: uppercase;
            white-space: nowrap;
        }

        .line-input {
            border: none;
            background: transparent;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            color: var(--dark);
            width: 100%;
            outline: none;
        }

        .vehicle-row {
            background: #fff;
            padding: 0 25px 20px;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 20px;
        }

        /* ── RESTO DO DOC ── */
        main {
            padding: 0 0 100px 0;
            max-width: 750px;
            margin-left: auto;
            margin-right: auto;
        }

        .doc {
            background: var(--cream);
            margin: 20px 10px;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 10px 50px rgba(0,0,0,0.4);
            border: 1px solid var(--border);
        }

        .top-decor {
            height: 6px;
            background: var(--orange);
        }

        .items-table { width: 100%; border-collapse: collapse; }
        .items-table thead tr { background: #333; }
        .items-table thead th {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 11px;
            color: white;
            padding: 10px;
            text-align: left;
            text-transform: uppercase;
        }

        .item-row td { border-bottom: 1px solid var(--border); padding: 0; }
        .item-row:nth-child(odd) td { background: var(--row-odd); }
        .item-row:nth-child(even) td { background: var(--row-even); }

        .item-row .num { 
            font-family: 'Oswald', sans-serif; 
            font-weight: 600; 
            font-size: 11px; 
            text-align: center;
            color: #888;
        }

        .item-row input {
            border: none; background: transparent;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px; color: var(--dark);
            width: 100%; outline: none; padding: 10px;
        }

        .total-row {
            background: var(--orange) !important;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .total-label { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; }
        .total-value { font-family: 'Bebas Neue', sans-serif; font-size: 28px; }

        .validade-block {
            background: #fff9f0;
            border-top: 1px dashed var(--border);
            padding: 15px 25px;
            font-size: 12px;
            line-height: 1.6;
            color: #555;
        }

        .validade-block strong { color: var(--orange-dark); font-family: 'Oswald', sans-serif; }

        .doc-footer {
            background: #222;
            color: #ccc;
            padding: 20px 25px;
            font-size: 11px;
        }

        .footer-grid {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .footer-brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            color: var(--orange);
            letter-spacing: 2px;
        }

        .action-bar {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 750px;
            background: var(--dark2); border-top: 3px solid var(--orange);
            padding: 12px 20px; display: flex; gap: 12px; z-index: 1000;
        }

        .btn {
            flex: 1; border: none; border-radius: 4px;
            font-family: 'Oswald', sans-serif; font-weight: 700;
            text-transform: uppercase; padding: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-pdf { background: var(--orange); color: white; flex: 2; font-size: 16px; }
        .btn-new { background: #444; color: #fff; flex: 0.8; font-size: 12px; }

        .toast {
            position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%);
            background: #333; color: #fff; padding: 10px 20px; border-radius: 30px;
            font-family: 'Oswald', sans-serif; opacity: 0; transition: 0.3s; z-index: 2000;
        }
        .toast.show { opacity: 1; }

        @media print {
            .action-bar, .topbar, .btn-new { display: none !important; }
            body { background: white; }
            .doc { margin: 0; box-shadow: none; border: none; }
        }
    </style>
</head>
<body>

    <main>
        <div class="doc">
            <div class="top-decor"></div>
            
            <header class="doc-header">
                <div class="header-logo-side">
                    <img src="logo.png" alt="Fonsecar">
                </div>
                <div class="header-content-side">
                    <div class="orcamento-banner">
                        <h2>ORÇAMENTO</h2>
                        <div class="num-box">
                            <span class="num-label">Nº</span>
                            <input class="line-input" id="num" style="color:white; font-weight:bold; width:110px" placeholder="PLACADDMMYY">
                        </div>
                    </div>
                    
                    <div class="header-main-fields">
                        <div class="line-field" style="grid-column: span 2">
                            <span class="line-label">Cliente:</span>
                            <input class="line-input" id="cliente" placeholder="Nome do cliente">
                        </div>
                        <div class="line-field">
                            <span class="line-label">Data:</span>
                            <input class="line-input" id="data" type="date" oninput="gerarNumero(); atualizarValidade();">
                        </div>
                        <div class="line-field">
                            <span class="line-label">Telefone:</span>
                            <input class="line-input" id="telefone" placeholder="(00) 00000-0000">
                        </div>
                    </div>
                </div>
            </header>

            <div class="vehicle-row">
                <div class="line-field">
                    <span class="line-label">Veículo:</span>
                    <input class="line-input" id="veiculo" placeholder="Ex: Honda Civic">
                </div>
                <div class="line-field">
                    <span class="line-label">Ano:</span>
                    <input class="line-input" id="ano" placeholder="2024">
                </div>
                <div class="line-field">
                    <span class="line-label">Placa:</span>
                    <input class="line-input" id="placa" placeholder="AAA-0000" style="text-transform:uppercase" oninput="gerarNumero()">
                </div>
            </div>

            <table class="items-table">
                <thead>
                    <tr>
                        <th style="width:40px; text-align:center">#</th>
                        <th>Descrição do Serviço / Peça</th>
                        <th style="width:60px; text-align:center">Qtd</th>
                        <th style="width:110px; text-align:right">Valor (R$)</th>
                    </tr>
                </thead>
                <tbody id="itemsBody"></tbody>
            </table>

            <div class="total-row">
                <span class="total-label">TOTAL DO ORÇAMENTO</span>
                <span class="total-value" id="totalDisplay">R$ 0,00</span>
            </div>

            <div class="validade-block" id="validadeTexto">
                <!-- Preenchido via JS -->
            </div>

            <div class="doc-footer">
                <div class="footer-grid">
                    <div>
                        <p>Rua Maranhão, 13, Bairro Industrial — Contagem, MG</p>
                        <p>CEP: 32.230-440 | CNPJ: 48.549.990/0001-48</p>
                    </div>
                    <div style="text-align:right">
                        <div class="footer-brand">FONSECAR</div>
                        <p style="color:var(--orange); font-weight:bold; font-size:16px">31 99273-0811</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="action-bar">
        <button class="btn btn-new" onclick="newOrcamento()">Novo</button>
        <button class="btn btn-pdf" onclick="gerarPDF()">Gerar PDF</button>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let rows = [];

        function formatarData(dateObj) {
            const d = String(dateObj.getDate()).padStart(2, '0');
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const a = dateObj.getFullYear();
            return `${d}/${m}/${a}`;
        }

        function calcVencimento(dataInput) {
            if (!dataInput) return null;
            const base = new Date(dataInput + 'T12:00:00');
            base.setDate(base.getDate() + 15);
            return base;
        }

        function atualizarValidade() {
            const dataVal = document.getElementById('data').value;
            const div = document.getElementById('validadeTexto');
            if (!dataVal) return;

            const emissao = new Date(dataVal + 'T12:00:00');
            const venc = calcVencimento(dataVal);
            
            div.innerHTML = `
                <strong>ATENÇÃO:</strong> Este orçamento é válido por 15 dias (${formatarData(emissao)}), vencendo em <strong>${formatarData(venc)}</strong>.<br><br>
                Após aprovação, podem ocorrer complementos de orçamento durante a desmontagem, situação em que o cliente será previamente comunicado para nova autorização.
            `;
        }

        function gerarNumero() {
    const placa = document.getElementById('placa').value.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
    const dataVal = document.getElementById('data').value;
    let ddmmyy = '';
    if (dataVal) {
        const parts = dataVal.split('-');
        ddmmyy = parts[2] + parts[1] + parts[0].substring(2);
    }
    document.getElementById('num').value = (placa && ddmmyy) ? `${placa}${ddmmyy}` : (placa || ddmmyy || '');
}
        function addRow(desc='', qty='', val='') {
            const tbody = document.getElementById('itemsBody');
            const tr = document.createElement('tr');
            tr.className = 'item-row';
            const idx = rows.length + 1;
            tr.innerHTML = `
                <td class="num">${String(idx).padStart(2,'0')}</td>
                <td><input class="inp-desc" value="${desc}" oninput="calcTotal()"></td>
                <td><input class="inp-qty" value="${qty}" style="text-align:center" oninput="calcTotal()"></td>
                <td><input class="inp-val" value="${val}" style="text-align:right" oninput="calcTotal()"></td>
            `;
            tbody.appendChild(tr);
            rows.push(tr);
        }

        function calcTotal() {
            let total = 0;
            document.querySelectorAll('.item-row').forEach(tr => {
                const q = parseFloat(tr.querySelector('.inp-qty').value.replace(',','.')) || 0;
                const v = parseFloat(tr.querySelector('.inp-val').value.replace(',','.')) || 0;
                total += q * v;
            });
            document.getElementById('totalDisplay').textContent = 'R$ ' + total.toLocaleString('pt-BR', {minimumFractionDigits:2});
            return total;
        }

        function newOrcamento() {
            if(!confirm('Limpar tudo?')) return;
            location.reload();
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.textContent = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('data').valueAsDate = new Date();
            for(let i=0; i<15; i++) addRow();
            atualizarValidade();
            gerarNumero();
        });

        // ── LOGO COMO BASE64 ──
        async function carregarLogoBase64() {
            try {
                const resp = await fetch('logo.png');
                const blob = await resp.blob();
                return await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                });
            } catch (e) { return null; }
        }

        async function gerarPDF() {
            showToast('Gerando PDF...');
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
            const logo = await carregarLogoBase64();
            
            const num = document.getElementById('num').value;
            const dataVal = document.getElementById('data').value;
            const dataStr = dataVal ? formatarData(new Date(dataVal + 'T12:00:00')) : '';
            const cliente = document.getElementById('cliente').value;
            const telefone = document.getElementById('telefone').value;
            const veiculo = document.getElementById('veiculo').value;
            const ano = document.getElementById('ano').value;
            const placa = document.getElementById('placa').value.toUpperCase();

            // Cores
            const ORANGE = [200, 75, 0];
            const DARK = [26, 10, 0];

            // ── Topo Laranja Fino ──
            doc.setFillColor(...ORANGE);
            doc.rect(0, 0, 210, 2, 'F');

            // ── Header: Logo esquerda, campos direita ──
            if(logo) {
                doc.addImage(logo, 'PNG', 15, 8, 40, 30, undefined, 'FAST');
            }
            
            // Banner "ORÇAMENTO"
            doc.setFillColor(...ORANGE);
            doc.rect(65, 8, 130, 10, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(18);
            doc.text('ORÇAMENTO', 68, 15);
            
            doc.setFontSize(10);
            doc.text('Nº ' + num, 192, 15, { align: 'right' });

            // Campos do Header
            doc.setTextColor(...DARK);
            doc.setFontSize(9);
            doc.setFont('helvetica', 'bold');
            doc.text('CLIENTE:', 65, 25);
            doc.setFont('helvetica', 'normal');
            doc.text(cliente, 82, 25);
            doc.line(82, 26, 195, 26);

            doc.setFont('helvetica', 'bold');
            doc.text('DATA:', 65, 32);
            doc.setFont('helvetica', 'normal');
            doc.text(dataStr, 77, 32);
            doc.line(77, 33, 110, 33);

            doc.setFont('helvetica', 'bold');
            doc.text('FONE:', 115, 32);
            doc.setFont('helvetica', 'normal');
            doc.text(telefone, 127, 32);
            doc.line(127, 33, 195, 33);

            // Veículo row
            doc.setFont('helvetica', 'bold');
            doc.text('VEÍCULO:', 15, 45);
            doc.setFont('helvetica', 'normal');
            doc.text(veiculo, 32, 45);
            doc.line(32, 46, 120, 46);

            doc.setFont('helvetica', 'bold');
            doc.text('ANO:', 125, 45);
            doc.setFont('helvetica', 'normal');
            doc.text(ano, 135, 45);
            doc.line(135, 46, 155, 46);

            doc.setFont('helvetica', 'bold');
            doc.text('PLACA:', 160, 45);
            doc.setFont('helvetica', 'bold');
            doc.text(placa, 175, 45);
            doc.line(175, 46, 195, 46);

            // ── Tabela ──
            doc.setFillColor(51, 51, 51);
            doc.rect(15, 52, 180, 8, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(8);
            doc.text('#', 18, 57);
            doc.text('DESCRIÇÃO DO SERVIÇO / PEÇA', 30, 57);
            doc.text('QTD', 155, 57, { align: 'center' });
            doc.text('VALOR (R$)', 192, 57, { align: 'right' });

            let y = 60;
            doc.setTextColor(...DARK);
            document.querySelectorAll('.item-row').forEach((tr, i) => {
                const d = tr.querySelector('.inp-desc').value;
                const q = tr.querySelector('.inp-qty').value;
                const v = tr.querySelector('.inp-val').value;
                if(!d && !v) return;

                if(i % 2 === 0) doc.setFillColor(250, 246, 240);
                else doc.setFillColor(240, 232, 218);
                
                doc.rect(15, y, 180, 7, 'F');
                doc.text(String(i+1).padStart(2,'0'), 18, y + 4.5);
                doc.text(d.substring(0, 65), 30, y + 4.5);
                doc.text(q, 155, y + 4.5, { align: 'center' });
                doc.text(v, 192, y + 4.5, { align: 'right' });
                y += 7;
            });

            // Total
            doc.setFillColor(...ORANGE);
            doc.rect(15, y + 2, 180, 12, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(12);
            doc.text('TOTAL DO ORÇAMENTO', 20, y + 10);
            doc.setFontSize(16);
            doc.text(document.getElementById('totalDisplay').textContent, 192, y + 10, { align: 'right' });

            // Validade
            y += 20;
            doc.setTextColor(80, 80, 80);
            doc.setFontSize(8);
            const venc = calcVencimento(dataVal);
            const vencStr = venc ? formatarData(venc) : '';
            doc.setFont('helvetica', 'bold');
            doc.text('ATENÇÃO:', 15, y);
            doc.setFont('helvetica', 'normal');
            doc.text(`Este orçamento é válido por 15 dias (${dataStr}), vencendo em ${vencStr}.`, 15, y + 4);
            doc.text('Após aprovação, podem ocorrer complementos de orçamento durante a desmontagem,', 15, y + 8);
            doc.text('situação em que o cliente será previamente comunicado para nova autorização.', 15, y + 11);

            // Footer
            doc.setFillColor(34, 34, 34);
            doc.rect(0, 270, 210, 27, 'F');
            doc.setFillColor(...ORANGE);
            doc.rect(0, 270, 210, 1, 'F');
            
            doc.setTextColor(200, 200, 200);
            doc.setFontSize(8);
            doc.text('Rua Maranhão, 13, Bairro Industrial — Contagem, MG', 15, 278);
            doc.text('CEP: 32.230-440 | CNPJ: 48.549.990/0001-48', 15, 283);
            
            doc.setTextColor(...ORANGE);
            doc.setFontSize(16);
            doc.setFont('helvetica', 'bold');
            doc.text('FONSECAR', 195, 280, { align: 'right' });
            doc.setTextColor(255, 255, 255);
            doc.text('31 99273-0811', 195, 288, { align: 'right' });

            doc.save(`orcamento_${num || 'sem_numero'}.pdf`);
            showToast('PDF gerado!');
        }
    </script>
</body>
</html>
