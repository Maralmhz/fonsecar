<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#C84B00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fonsecar">
    <title>Fonsecar - Orçamento</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Share+Tech+Mono&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --orange: #C84B00;
            --orange-dark: #9e3a00;
            --orange-light: #e85d00;
            --cream: #f5f0e8;
            --dark: #1a0a00;
            --dark2: #2d1200;
            --white: #ffffff;
            --border: #c89060;
            --row-odd: #faf6f0;
            --row-even: #f0e8da;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        html, body {
            min-height: 100vh;
            background: var(--dark);
            font-family: 'Roboto', sans-serif;
            color: var(--dark);
            overscroll-behavior: none;
        }

        /* ── LAYOUT PRINCIPAL ── */
        main {
            padding: 0 0 90px 0;
            max-width: 750px;
            margin: 0 auto;
        }

        .doc {
            background: var(--cream);
            margin: 12px 8px;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.45);
            border: 1px solid var(--border);
        }

        .top-decor {
            height: 5px;
            background: var(--orange);
        }

        /* ── HEADER ── */
        .doc-header {
            background: var(--white);
            display: flex;
            align-items: flex-start;
            padding: 14px 14px 10px;
            gap: 12px;
        }

        .header-logo-side {
            flex: 0 0 90px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-logo-side img {
            width: 90px;
            height: 70px;
            object-fit: contain;
        }

        .header-content-side {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .orcamento-banner {
            background: var(--orange);
            color: white;
            padding: 6px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 2px;
        }

        .orcamento-banner h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            letter-spacing: 3px;
            line-height: 1;
        }

        .num-box {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .num-label {
            font-family: 'Oswald', sans-serif;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        #num {
            color: white !important;
            font-weight: bold;
            width: 90px;
            font-size: 11px;
        }

        /* Campos do header em coluna única no mobile */
        .header-fields {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .fields-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .line-field {
            display: flex;
            align-items: baseline;
            gap: 5px;
            border-bottom: 1px solid #e0d8cc;
            padding-bottom: 2px;
        }

        .line-label {
            font-family: 'Oswald', sans-serif;
            font-size: 10px;
            font-weight: 600;
            color: var(--orange-dark);
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .line-input {
            border: none;
            background: transparent;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: var(--dark);
            width: 100%;
            min-width: 0;
            outline: none;
            padding: 0;
        }

        /* ── VEÍCULO ── */
        .vehicle-row {
            background: #fff;
            padding: 8px 14px 12px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .vehicle-row .veiculo-field {
            grid-column: span 2;
        }

        /* ── TABELA ── */
        .items-table { width: 100%; border-collapse: collapse; }
        .items-table thead tr { background: #333; }
        .items-table thead th {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 10px;
            color: white;
            padding: 8px 6px;
            text-align: left;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .items-table thead th:first-child { text-align: center; }
        .items-table thead th:last-child { text-align: right; }

        .item-row td { border-bottom: 1px solid var(--border); padding: 0; }
        .item-row:nth-child(odd) td { background: var(--row-odd); }
        .item-row:nth-child(even) td { background: var(--row-even); }

        .item-row .num {
            font-family: 'Oswald', sans-serif;
            font-weight: 600;
            font-size: 10px;
            text-align: center;
            color: #999;
            width: 30px;
        }

        .item-row input {
            border: none; background: transparent;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px; color: var(--dark);
            width: 100%; outline: none;
            padding: 9px 6px;
        }

        /* Colunas da tabela */
        .col-num  { width: 30px; }
        .col-desc { }
        .col-qty  { width: 44px; }
        .col-val  { width: 90px; }

        /* ── TOTAL ── */
        .total-row {
            background: var(--orange) !important;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            color: white;
        }

        .total-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 2px;
        }

        .total-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 26px;
            line-height: 1;
        }

        .pacote-row {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: flex-end;
        }

        #labelPacote {
            display: flex;
            align-items: center;
            gap: 5px;
            font-family: 'Oswald', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            opacity: 0.9;
        }

        #chkPacote {
            width: 15px; height: 15px;
            cursor: pointer;
            accent-color: white;
        }

        #inputPacote {
            display: none;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            color: white;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(255,255,255,0.6);
            outline: none;
            width: 140px;
            text-align: right;
        }

        /* ── VALIDADE ── */
        .validade-block {
            background: #fff9f0;
            border-top: 1px dashed var(--border);
            padding: 12px 14px;
            font-size: 11px;
            line-height: 1.6;
            color: #555;
        }

        .validade-block strong { color: var(--orange-dark); font-family: 'Oswald', sans-serif; }

        /* ── FOOTER ── */
        .doc-footer {
            background: #222;
            color: #ccc;
            padding: 14px;
            font-size: 10px;
        }

        .footer-grid {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 8px;
        }

        .footer-brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            color: var(--orange);
            letter-spacing: 2px;
        }

        /* ── ACTION BAR ── */
        .action-bar {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 750px;
            background: var(--dark2); border-top: 3px solid var(--orange);
            padding: 10px 14px; display: flex; gap: 10px; z-index: 1000;
        }

        .btn {
            flex: 1; border: none; border-radius: 4px;
            font-family: 'Oswald', sans-serif; font-weight: 700;
            text-transform: uppercase; padding: 13px 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 14px;
        }

        .btn-pdf { background: var(--orange); color: white; flex: 2; }
        .btn-new { background: #444; color: #fff; flex: 0.7; font-size: 12px; }

        .toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: #333; color: #fff; padding: 9px 18px; border-radius: 30px;
            font-family: 'Oswald', sans-serif; font-size: 13px;
            opacity: 0; transition: 0.3s; z-index: 2000;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; }

        /* ── DESKTOP (≥520px) ── */
        @media (min-width: 520px) {
            .doc { margin: 20px 12px; }

            .doc-header { padding: 18px 20px 14px; gap: 18px; }

            .header-logo-side { flex: 0 0 130px; }
            .header-logo-side img { width: 130px; height: 100px; }

            .orcamento-banner h2 { font-size: 30px; }
            #num { width: 110px; font-size: 13px; }

            .fields-row { grid-template-columns: 1fr 1fr; }

            .line-label { font-size: 11px; }
            .line-input { font-size: 13px; }

            .vehicle-row {
                padding: 0 20px 16px;
                grid-template-columns: 2fr 1fr 1fr;
            }
            .vehicle-row .veiculo-field { grid-column: span 1; }

            .items-table thead th { font-size: 11px; padding: 10px 8px; }
            .item-row input { font-size: 13px; padding: 10px 8px; }
            .col-qty { width: 60px; }
            .col-val { width: 110px; }

            .total-row { flex-direction: row; align-items: center; padding: 14px 20px; }
            .total-top { flex: 1; }
            .total-label { font-size: 20px; }
            .total-value { font-size: 28px; }
            .pacote-row { flex-direction: row; }

            .validade-block { padding: 14px 20px; font-size: 12px; }
            .doc-footer { padding: 18px 20px; font-size: 11px; }
            .footer-brand { font-size: 22px; }

            .action-bar { padding: 12px 20px; }
            .btn { font-size: 15px; padding: 14px; }
        }

        @media print {
            .action-bar { display: none !important; }
            body { background: white; }
            .doc { margin: 0; box-shadow: none; border: none; }
        }
    </style>
</head>
<body>

    <main>
        <div class="doc">
            <div class="top-decor"></div>

            <header class="doc-header">
                <div class="header-logo-side">
                    <img src="logo.png" alt="Fonsecar" loading="lazy">
                </div>
                <div class="header-content-side">
                    <div class="orcamento-banner">
                        <h2>ORÇAMENTO</h2>
                        <div class="num-box">
                            <span class="num-label">Nº</span>
                            <input class="line-input" id="num" placeholder="PLACA+DATA">
                        </div>
                    </div>

                    <div class="header-fields">
                        <div class="line-field">
                            <span class="line-label">Cliente:</span>
                            <input class="line-input" id="cliente" placeholder="Nome do cliente">
                        </div>
                        <div class="fields-row">
                            <div class="line-field">
                                <span class="line-label">Data:</span>
                                <input class="line-input" id="data" type="date" oninput="gerarNumero(); atualizarValidade();">
                            </div>
                            <div class="line-field">
                                <span class="line-label">Fone:</span>
                                <input class="line-input" id="telefone" placeholder="(00) 00000-0000">
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="vehicle-row">
                <div class="line-field veiculo-field">
                    <span class="line-label">Veículo:</span>
                    <input class="line-input" id="veiculo" placeholder="Ex: Honda Civic">
                </div>
                <div class="line-field">
                    <span class="line-label">Ano:</span>
                    <input class="line-input" id="ano" placeholder="2024">
                </div>
                <div class="line-field">
                    <span class="line-label">Placa:</span>
                    <input class="line-input" id="placa" placeholder="AAA-0000" style="text-transform:uppercase" oninput="gerarNumero()">
                </div>
            </div>

            <table class="items-table">
                <thead>
                    <tr>
                        <th class="col-num">#</th>
                        <th>Descrição do Serviço / Peça</th>
                        <th class="col-qty" style="text-align:center">Qtd</th>
                        <th class="col-val" style="text-align:right">Valor (R$)</th>
                    </tr>
                </thead>
                <tbody id="itemsBody"></tbody>
            </table>

            <div class="total-row">
                <div class="total-top">
                    <span class="total-label">TOTAL</span>
                    <span class="total-value" id="totalDisplay">R$ 0,00</span>
                    <input id="inputPacote" type="text" placeholder="Ex: 1.500,00" oninput="atualizarPacote(this.value)">
                </div>
                <div class="pacote-row">
                    <label id="labelPacote">
                        <input type="checkbox" id="chkPacote" onchange="togglePacote(this.checked)">
                        PACOTE FECHADO
                    </label>
                </div>
            </div>

            <div class="validade-block" id="validadeTexto"></div>

            <div class="doc-footer">
                <div class="footer-grid">
                    <div>
                        <p>Rua Maranhão, 13, Bairro Industrial</p>
                        <p>Contagem, MG — CNPJ: 48.549.990/0001-48</p>
                    </div>
                    <div style="text-align:right">
                        <div class="footer-brand">FONSECAR</div>
                        <p style="color:var(--orange); font-weight:bold; font-size:14px">31 99273-0811</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="action-bar">
        <button class="btn btn-new" onclick="newOrcamento()">Novo</button>
        <button class="btn btn-pdf" onclick="gerarPDF()">⬇ Gerar PDF</button>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let rows = [];

        function formatarData(dateObj) {
            const d = String(dateObj.getDate()).padStart(2, '0');
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const a = dateObj.getFullYear();
            return `${d}/${m}/${a}`;
        }

        function calcVencimento(dataInput) {
            if (!dataInput) return null;
            const base = new Date(dataInput + 'T12:00:00');
            base.setDate(base.getDate() + 15);
            return base;
        }

        function atualizarValidade() {
            const dataVal = document.getElementById('data').value;
            const div = document.getElementById('validadeTexto');
            if (!dataVal) return;
            const emissao = new Date(dataVal + 'T12:00:00');
            const venc = calcVencimento(dataVal);
            div.innerHTML = `
                <strong>ATENÇÃO:</strong> Orçamento válido por 15 dias (${formatarData(emissao)}), vencendo em <strong>${formatarData(venc)}</strong>.<br>
                Após aprovação, podem ocorrer complementos durante a desmontagem, situação em que o cliente será previamente comunicado.
            `;
        }

        function gerarNumero() {
            const placa = document.getElementById('placa').value.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
            const dataVal = document.getElementById('data').value;
            let ddmmyy = '';
            if (dataVal) {
                const parts = dataVal.split('-');
                ddmmyy = parts[2] + parts[1] + parts[0].substring(2);
            }
            document.getElementById('num').value = (placa && ddmmyy) ? `${placa}${ddmmyy}` : (placa || ddmmyy || '');
        }

        function addRow(desc='', qty='', val='') {
            const tbody = document.getElementById('itemsBody');
            const tr = document.createElement('tr');
            tr.className = 'item-row';
            const idx = rows.length + 1;
            tr.innerHTML = `
                <td class="num col-num">${String(idx).padStart(2,'0')}</td>
                <td><input class="inp-desc" value="${desc}" oninput="calcTotal()"></td>
                <td class="col-qty"><input class="inp-qty" value="${qty}" style="text-align:center" oninput="calcTotal()"></td>
                <td class="col-val"><input class="inp-val" value="${val}" style="text-align:right" oninput="calcTotal()"></td>
            `;
            tbody.appendChild(tr);
            rows.push(tr);
        }

        function parseBR(str) {
            if (!str) return 0;
            str = str.trim();
            if (str.includes(',')) {
                str = str.replace(/\./g, '').replace(',', '.');
            }
            return parseFloat(str) || 0;
        }

        let modoPackFechado = false;

        function calcTotal() {
            if (modoPackFechado) return;
            let total = 0;
            document.querySelectorAll('.item-row').forEach(tr => {
                const qStr = tr.querySelector('.inp-qty').value.trim();
                const q = qStr === '' ? 1 : parseBR(qStr);
                const v = parseBR(tr.querySelector('.inp-val').value);
                total += q * v;
            });
            document.getElementById('totalDisplay').textContent = 'R$ ' + total.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
            return total;
        }

        function togglePacote(ativo) {
            modoPackFechado = ativo;
            const disp = document.getElementById('totalDisplay');
            const inp = document.getElementById('inputPacote');
            if (ativo) {
                disp.style.display = 'none';
                inp.style.display = 'inline-block';
                inp.focus();
            } else {
                disp.style.display = 'inline-block';
                inp.style.display = 'none';
                inp.value = '';
                calcTotal();
            }
        }

        function atualizarPacote(val) {}

        function newOrcamento() {
            if(!confirm('Limpar tudo?')) return;
            location.reload();
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.textContent = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('data').valueAsDate = new Date();
            for(let i=0; i<15; i++) addRow();
            atualizarValidade();
            gerarNumero();
        });

        async function carregarLogoBase64() {
            try {
                const resp = await fetch('logo.png');
                const blob = await resp.blob();
                return await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                });
            } catch (e) { return null; }
        }

        async function gerarPDF() {
            showToast('Gerando PDF...');
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
            const logo = await carregarLogoBase64();

            const num = document.getElementById('num').value;
            const dataVal = document.getElementById('data').value;
            const dataStr = dataVal ? formatarData(new Date(dataVal + 'T12:00:00')) : '';
            const cliente = document.getElementById('cliente').value;
            const telefone = document.getElementById('telefone').value;
            const veiculo = document.getElementById('veiculo').value;
            const ano = document.getElementById('ano').value;
            const placa = document.getElementById('placa').value.toUpperCase();

            const ORANGE = [200, 75, 0];
            const DARK = [26, 10, 0];

            doc.setFillColor(...ORANGE);
            doc.rect(0, 0, 210, 2, 'F');

            if(logo) doc.addImage(logo, 'PNG', 15, 8, 40, 30, undefined, 'FAST');

            doc.setFillColor(...ORANGE);
            doc.rect(65, 8, 130, 10, 'F');
            doc.setTextColor(255,255,255);
            doc.setFont('helvetica','bold');
            doc.setFontSize(18);
            doc.text('ORÇAMENTO', 68, 15);
            doc.setFontSize(10);
            doc.text('Nº ' + num, 192, 15, { align:'right' });

            doc.setTextColor(...DARK);
            doc.setFontSize(9);
            doc.setFont('helvetica','bold'); doc.text('CLIENTE:', 65, 25);
            doc.setFont('helvetica','normal'); doc.text(cliente, 82, 25); doc.line(82,26,195,26);
            doc.setFont('helvetica','bold'); doc.text('DATA:', 65, 32);
            doc.setFont('helvetica','normal'); doc.text(dataStr, 77, 32); doc.line(77,33,110,33);
            doc.setFont('helvetica','bold'); doc.text('FONE:', 115, 32);
            doc.setFont('helvetica','normal'); doc.text(telefone, 127, 32); doc.line(127,33,195,33);
            doc.setFont('helvetica','bold'); doc.text('VEÍCULO:', 15, 45);
            doc.setFont('helvetica','normal'); doc.text(veiculo, 32, 45); doc.line(32,46,120,46);
            doc.setFont('helvetica','bold'); doc.text('ANO:', 125, 45);
            doc.setFont('helvetica','normal'); doc.text(ano, 135, 45); doc.line(135,46,155,46);
            doc.setFont('helvetica','bold'); doc.text('PLACA:', 160, 45);
            doc.setFont('helvetica','bold'); doc.text(placa, 175, 45); doc.line(175,46,195,46);

            doc.setFillColor(51,51,51);
            doc.rect(15, 52, 180, 8, 'F');
            doc.setTextColor(255,255,255);
            doc.setFontSize(8);
            doc.text('#', 18, 57);
            doc.text('DESCRIÇÃO DO SERVIÇO / PEÇA', 30, 57);
            doc.text('QTD', 155, 57, {align:'center'});
            doc.text('VALOR (R$)', 192, 57, {align:'right'});

            let y = 60;
            doc.setTextColor(...DARK);
            document.querySelectorAll('.item-row').forEach((tr, i) => {
                const d = tr.querySelector('.inp-desc').value;
                const q = tr.querySelector('.inp-qty').value;
                const v = tr.querySelector('.inp-val').value;
                if(!d && !v) return;
                if(i%2===0) doc.setFillColor(250,246,240); else doc.setFillColor(240,232,218);
                doc.rect(15,y,180,7,'F');
                doc.text(String(i+1).padStart(2,'0'), 18, y+4.5);
                doc.text(d.substring(0,65), 30, y+4.5);
                doc.text(q, 155, y+4.5, {align:'center'});
                doc.text(v, 192, y+4.5, {align:'right'});
                y += 7;
            });

            doc.setFillColor(...ORANGE);
            doc.rect(15,y+2,180,12,'F');
            doc.setTextColor(255,255,255);
            doc.setFontSize(12);
            doc.text('TOTAL DO ORÇAMENTO', 20, y+10);
            doc.setFontSize(16);
            const isPacote = document.getElementById('chkPacote').checked;
            let totalText;
            if (isPacote) {
                const raw = document.getElementById('inputPacote').value.trim();
                totalText = raw ? 'R$ ' + raw : 'R$ 0,00';
            } else {
                totalText = document.getElementById('totalDisplay').textContent;
            }
            doc.text(totalText, 192, y+10, {align:'right'});

            y += 20;
            doc.setTextColor(80,80,80); doc.setFontSize(8);
            const venc = calcVencimento(dataVal);
            const vencStr = venc ? formatarData(venc) : '';
            doc.setFont('helvetica','bold'); doc.text('ATENÇÃO:', 15, y);
            doc.setFont('helvetica','normal');
            doc.text(`Este orçamento é válido por 15 dias (${dataStr}), vencendo em ${vencStr}.`, 15, y+4);
            doc.text('Após aprovação, podem ocorrer complementos durante a desmontagem,', 15, y+8);
            doc.text('situação em que o cliente será previamente comunicado para nova autorização.', 15, y+11);

            doc.setFillColor(34,34,34); doc.rect(0,270,210,27,'F');
            doc.setFillColor(...ORANGE); doc.rect(0,270,210,1,'F');
            doc.setTextColor(200,200,200); doc.setFontSize(8);
            doc.text('Rua Maranhão, 13, Bairro Industrial — Contagem, MG', 15, 278);
            doc.text('CEP: 32.230-440 | CNPJ: 48.549.990/0001-48', 15, 283);
            doc.setTextColor(...ORANGE); doc.setFontSize(16); doc.setFont('helvetica','bold');
            doc.text('FONSECAR', 195, 280, {align:'right'});
            doc.setTextColor(255,255,255);
            doc.text('31 99273-0811', 195, 288, {align:'right'});

            doc.save(`orcamento_${num || 'sem_numero'}.pdf`);
            showToast('PDF gerado com sucesso!');
        }
    </script>
